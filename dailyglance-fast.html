<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>DailyGlance v4.1 极速版</title>
<style>
:root {
  --bg: #101114;
  --panel: #181a20;
  --panel-2: #20242b;
  --panel-3: #252a32;
  --line: rgba(255,255,255,.1);
  --text: #f4f6f8;
  --muted: #98a2ad;
  --soft: #c7cdd4;
  --red: #ef4444;
  --green: #22c55e;
  --blue: #38bdf8;
  --yellow: #f59e0b;
  --teal: #14b8a6;
  --danger: #fb7185;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
body { padding: 0 0 calc(78px + var(--safe-bottom)); }
button, input { font: inherit; }
button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
.app { width: min(1120px, 100%); margin: 0 auto; }
.topbar { position: sticky; top: 0; z-index: 30; padding: calc(10px + env(safe-area-inset-top, 0px)) 12px 10px; background: rgba(16,17,20,.94); border-bottom: 1px solid var(--line); backdrop-filter: blur(16px); }
.top-row { display: grid; grid-template-columns: minmax(0,1fr) auto auto; align-items: center; gap: 8px; }
.brand { min-width: 0; }
.brand strong { display: block; font-size: 17px; line-height: 1.05; font-weight: 950; letter-spacing: 0; }
.brand span { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-btn { height: 34px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel-2); color: var(--text); padding: 0 10px; font-size: 12px; font-weight: 900; }
.strategy-btn { border-color: rgba(20,184,166,.35); color: #ccfbf1; background: rgba(20,184,166,.13); }
.market-strip { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
.market-pill { min-width: 0; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.035); padding: 7px 6px; }
.market-pill .market-line { display: flex; align-items: center; justify-content: space-between; gap: 4px; min-width: 0; white-space: nowrap; }
.market-pill .market-line + .market-line { margin-top: 4px; }
.market-pill .name { min-width: 0; overflow: hidden; text-overflow: ellipsis; color: var(--muted); font-size: 10px; font-weight: 800; }
.market-pill .state { flex-shrink: 0; font-size: 10px; font-weight: 950; }
.market-pill .price { min-width: 0; overflow: hidden; text-overflow: ellipsis; text-align: right; font: 900 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: #e5e7eb; }
.market-pill .change { flex-shrink: 0; font: 900 10px ui-monospace, SFMono-Regular, Menlo, monospace; }
.market-pill.bull .state { color: var(--red); }
.market-pill.bear .state { color: var(--green); }
.market-pill.neutral .state { color: var(--yellow); }
.strategy-menu { position: absolute; right: 12px; top: calc(50px + env(safe-area-inset-top, 0px)); z-index: 50; display: none; width: min(300px, calc(100vw - 24px)); padding: 7px; border: 1px solid rgba(255,255,255,.13); border-radius: 10px; background: #15171c; box-shadow: 0 20px 46px rgba(0,0,0,.45); }
.strategy-menu.show { display: block; }
.strategy-option { width: 100%; min-height: 42px; border: 0; border-radius: 8px; background: transparent; color: var(--soft); text-align: left; padding: 7px 9px; }
.strategy-option strong { display: block; font-size: 13px; }
.strategy-option span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; line-height: 1.35; }
.strategy-option.active { color: #fff; background: rgba(20,184,166,.16); }
.search-wrap { position: relative; padding: 10px 12px 6px; }
.search-box { display: grid; grid-template-columns: minmax(0,1fr) 70px; gap: 8px; align-items: center; }
.search-box input { height: 40px; width: 100%; min-width: 0; border: 1px solid var(--line); border-radius: 9px; outline: 0; background: var(--panel); color: var(--text); padding: 0 12px; font-size: 14px; }
.search-box input::placeholder { color: #737b85; }
.search-box button { height: 40px; border: 0; border-radius: 9px; background: var(--teal); color: #042f2e; font-weight: 950; }
.suggest { position: absolute; left: 12px; right: 12px; top: 56px; z-index: 40; display: none; max-height: 300px; overflow-y: auto; border: 1px solid rgba(255,255,255,.13); border-radius: 10px; background: #15171c; box-shadow: 0 18px 42px rgba(0,0,0,.45); }
.suggest-item { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px; width: 100%; padding: 12px; border: 0; border-bottom: 1px solid rgba(255,255,255,.06); background: transparent; color: var(--text); text-align: left; }
.suggest-item:last-child { border-bottom: 0; }
.suggest-item.active { background: rgba(20,184,166,.16); }
.suggest-item .name { font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.suggest-item .code { color: var(--muted); font: 800 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
.board-head { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: end; gap: 10px; padding: 9px 12px 8px; }
.board-head h2 { margin: 0; font-size: 13px; color: var(--soft); letter-spacing: 0; }
.board-head span { color: var(--muted); font-size: 11px; text-align: right; }
.list { display: grid; grid-template-columns: 1fr; gap: 9px; padding: 0 12px; }
.card { min-width: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 10px; background: linear-gradient(180deg, rgba(37,42,50,.96), rgba(24,26,32,.98)); }
.card.hot { border-color: rgba(239,68,68,.34); }
.card.watch { border-color: rgba(245,158,11,.35); }
.card.safe { border-color: rgba(148,163,184,.22); }
.card.wait { border-color: rgba(148,163,184,.18); }
.card-head { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; padding: 12px 12px 7px; }
.stock-title { min-width: 0; }
.stock-title .name { font-size: 16px; line-height: 1.1; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stock-title .meta { margin-top: 4px; color: var(--muted); font: 800 11px ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.priority-badge { display: inline-flex; margin-left: 6px; vertical-align: 2px; border-radius: 999px; padding: 2px 6px; background: rgba(148,163,184,.16); color: #cbd5e1; font-size: 10px; line-height: 1.2; font-weight: 950; }
.priority-badge.danger { background: rgba(251,113,133,.18); color: #fecdd3; }
.priority-badge.warn { background: rgba(245,158,11,.18); color: #fde68a; }
.priority-badge.good { background: rgba(20,184,166,.18); color: #99f6e4; }
.price { text-align: right; white-space: nowrap; }
.price .num { font: 950 20px ui-monospace, SFMono-Regular, Menlo, monospace; }
.price .chg { margin-top: 2px; font: 900 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
.up { color: var(--red); }
.down { color: var(--green); }
.flat { color: var(--muted); }
.action-grid { display: grid; grid-template-columns: minmax(0,1fr) 82px 64px; gap: 7px; padding: 0 12px 9px; }
.action-box, .position-box, .score-box { min-width: 0; border: 1px solid rgba(255,255,255,.07); border-radius: 8px; background: rgba(255,255,255,.035); padding: 8px; }
.tiny-label { color: var(--muted); font-size: 10px; line-height: 1; font-weight: 900; }
.action-box .action { margin-top: 5px; font-size: 20px; line-height: 1.05; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.position-box, .score-box { text-align: center; padding-left: 5px; padding-right: 5px; }
.position-box .val { margin-top: 3px; font: 950 24px ui-monospace, SFMono-Regular, Menlo, monospace; }
.score-box .val { margin-top: 6px; font: 950 18px ui-monospace, SFMono-Regular, Menlo, monospace; }
.metric-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1px; margin: 0 12px 9px; overflow: hidden; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; background: rgba(255,255,255,.08); }
.metric { min-width: 0; padding: 7px 5px; background: rgba(16,17,20,.72); text-align: center; }
.metric .k { color: var(--muted); font-size: 10px; }
.metric .v { margin-top: 3px; font: 900 12px ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fit-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 7px; margin: 0 12px 9px; }
.fit-pill { min-width: 0; border: 1px solid rgba(255,255,255,.07); border-radius: 8px; background: rgba(255,255,255,.035); padding: 8px; }
.fit-pill .k { color: var(--muted); font-size: 10px; font-weight: 900; }
.fit-pill .v { margin-top: 4px; color: var(--soft); font-size: 12px; line-height: 1.35; font-weight: 950; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.backtest-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 1px; margin: 0 12px 9px; overflow: hidden; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; background: rgba(255,255,255,.08); }
.bt { min-width: 0; padding: 7px 5px; background: rgba(16,17,20,.62); text-align: center; }
.bt .k { color: var(--muted); font-size: 10px; }
.bt .v { margin-top: 3px; font: 950 12px ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bt.good .v { color: var(--teal); }
.bt.bad .v { color: var(--danger); }
.bt.mid .v { color: var(--yellow); }
.reason { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; padding: 0 12px 9px; color: #d2d7de; font-size: 12px; line-height: 1.45; }
.signals { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 12px 9px; }
.tag { max-width: 100%; border-radius: 999px; padding: 3px 7px; background: rgba(148,163,184,.15); color: #cbd5e1; font-size: 10px; line-height: 1.25; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag.buy { background: rgba(56,189,248,.18); color: #bae6fd; }
.tag.exit { background: rgba(251,113,133,.16); color: #fecdd3; }
.tag.warn { background: rgba(245,158,11,.17); color: #fde68a; }
.spark { display: block; width: calc(100% - 24px); height: 34px; margin: 0 12px 8px; }
.quick-note { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: center; margin: 0 12px 9px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,.03); color: var(--muted); font-size: 11px; }
.quick-note strong { color: var(--soft); font-weight: 950; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-foot { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 8px; min-height: 36px; padding: 7px 12px; border-top: 1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.025); color: var(--muted); font-size: 11px; }
.card-foot span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-foot button { border: 0; background: transparent; color: #a8b0ba; font-size: 12px; font-weight: 900; padding: 5px 0 5px 8px; }
.empty { display: none; margin: 24px 12px 0; padding: 24px 18px; border: 1px dashed rgba(255,255,255,.18); border-radius: 10px; color: var(--muted); text-align: center; line-height: 1.7; font-size: 13px; }
.toast { position: fixed; left: 16px; right: 16px; bottom: calc(80px + var(--safe-bottom)); z-index: 80; display: none; padding: 12px 14px; border: 1px solid rgba(255,255,255,.13); border-radius: 10px; background: rgba(20,22,28,.96); box-shadow: 0 16px 36px rgba(0,0,0,.38); color: var(--text); text-align: center; font-size: 13px; }
.bottom-bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; padding: 9px 12px calc(9px + var(--safe-bottom)); border-top: 1px solid var(--line); background: rgba(16,17,20,.94); backdrop-filter: blur(16px); }
.bottom-inner { width: min(1120px, 100%); margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.bottom-inner button { height: 42px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel-2); color: #e7eaee; font-weight: 950; }
.bottom-inner .primary { border-color: rgba(20,184,166,.55); background: var(--teal); color: #052f2c; }
@media (min-width: 720px) {
  body { padding-bottom: 24px; }
  .list { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .bottom-bar { position: sticky; bottom: 0; }
}
@media (min-width: 1180px) {
  .list { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (max-width: 520px) {
  body { padding-bottom: calc(74px + var(--safe-bottom)); }
  .topbar { padding: calc(8px + env(safe-area-inset-top, 0px)) 10px 7px; }
  .top-row { gap: 6px; }
  .brand strong { font-size: 16px; }
  .brand span { margin-top: 3px; font-size: 10px; }
  .pill-btn { height: 31px; padding: 0 8px; }
  .market-strip { gap: 4px; margin-top: 7px; }
  .market-pill { padding: 5px 4px; border-radius: 7px; }
  .market-pill .market-line + .market-line { margin-top: 3px; }
  .market-pill .name { font-size: 9px; }
  .market-pill .state { font-size: 10px; }
  .market-pill .price { display: block; font-size: 10px; }
  .market-pill .change { font-size: 10px; }
  .search-wrap { padding: 8px 10px 5px; }
  .board-head { padding: 7px 10px; }
  .list { padding: 0 10px; gap: 8px; }
}
@media (max-width: 380px) {
  .action-grid { grid-template-columns: minmax(0,1fr) 72px 56px; }
  .action-box .action { font-size: 18px; }
  .position-box .val { font-size: 21px; }
  .metric-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .backtest-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
}
</style>
</head>

function getFastStrategyRoute(market) {

  if(market?.label === '全面弱势') return { recommended:'波段抄底型', label:'防守优先', note:'弱势环境，不放大新仓' };
  if(['温和偏多','结构性题材行情'].includes(market?.label)) return { recommended:'稳健趋势型', label:'趋势过滤', note:'结构机会需个股确认' };

function getFastRelativeStrength(data, date) {
  const market = state.rawData.sh || [];
  if(!data?.length || market.length < 25) return null;
  const sIdx = findDateIndex(data, date), mIdx = findDateIndex(market, date);
  if(sIdx < 20 || mIdx < 20) return null;
  const sBase = data[sIdx - 20]?.close, mBase = market[mIdx - 20]?.close;
  if(!sBase || !mBase) return null;
  const sRet = (data[sIdx].close - sBase) / sBase * 100;
  const mRet = (market[mIdx].close - mBase) / mBase * 100;
  const diff = sRet - mRet;

}
function getFastHoldingState(data, meta, decision) {

  if(decision.exit?.level === '清仓防守' || decision.exit?.level === '强离场') label = '破位防守';

}
function getPriorityTag(action, holding) {

function analyzeStock(stock) {

  const data = state.rawData[id] || [];
  if(!data.length) return { code, name, status:'loading', action:'等待数据', tone:'wait', position:0, score:0, reason:'正在读取或下载行情数据。', tags:[] };
  const item = data[data.length - 1], prev = data[data.length - 2] || item;
  const change = item.close - prev.close, changePct = prev.close ? change / prev.close * 100 : 0;
  if(data.length < 60) {
    return { code, name, status:'short', item, prev, change, changePct, action:'持币观望', tone:'wait', position:0, score:0, reason:buildReason({}, {}, data.length), tags:[], risk:null, market:getMarketContext(item.date), meta:null };

  const idx = data.length - 1;
  const meta = getSignalMeta(idx, data, ind);

  const backtest = runBacktestSummary(id, data, ind);

  const allTags = [...new Set([...(data[idx]._signals || []), ...meta.windowSignals.map(w => w.signal)])];
  const tags = allTags.slice(0, 3);
  if(allTags.length > tags.length) tags.push(`+${allTags.length - tags.length}`);
  return {
    code, name, id, status:'ready', item, prev, change, changePct,
    action:decision.simpleAction, tone:decision.tone, position:decision.position, score:meta.windowScore,
    reason:buildReason(meta, decision, data.length), tags, risk:decision.risk, market:decision.market, meta, decision,

}

async function refreshAll(force = false) {
  if(state.refreshing) return;
  state.refreshing = true;
  $('refreshBottomBtn').disabled = true;
  $('refreshBottomBtn').textContent = '刷新中';
  let ok = 0, cachedOnly = 0, fail = 0;
  try {
    const targets = [...INDEX_IDS, ...state.watchlist.map(s => codeToSecid(s.code)).filter(Boolean)];
    for(const id of targets) {
      const cached = (await dbGet(id))?.data;
      if(cached?.length && !state.rawData[id]) setRawData(id, cached);
    }
    renderAll();
    for(const id of targets) {
      const result = await syncData(id);
      if(result.source === 'fresh') ok++;
      else if(result.data?.length) cachedOnly++;
      else fail++;
      renderAll();
    }
    if(ok > 0) state.lastUpdated = Date.now();
    state.lastRefreshSummary = cachedOnly || fail ? `${ok}/${targets.length}更新·${cachedOnly}缓存` : `${ok}/${targets.length}更新`;
    if(ok === targets.length) toast(force ? `刷新完成：${ok}/${targets.length}` : `已同步：${ok}/${targets.length}`);
    else if(ok > 0) toast(`部分更新：${ok}/${targets.length}，${cachedOnly + fail} 个使用缓存`);
    else toast('行情接口未更新，已使用本地缓存');
  } finally {
    state.refreshing = false;
    $('refreshBottomBtn').disabled = false;
    $('refreshBottomBtn').textContent = '刷新全部';
    renderAll();
  }
}
function searchLocalStocks(q) {
  const qt = q.toLowerCase();
  const fb = STOCK_DATABASE.filter(s => s.Name.toLowerCase().includes(qt) || s.Code.includes(qt));
  const fc = state.stockCache.filter(s => !fb.some(b => b.Code === s.Code) && (s.Name.toLowerCase().includes(qt) || s.Code.includes(qt)));
  return fb.concat(fc);
}
function jsonpSearchEastmoney(query) {
  return new Promise(resolve => {
    const cb = 'em_search_fast_v41_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const url = `https://searchadapter.eastmoney.com/api/suggest/get?input=${encodeURIComponent(query)}&type=14&token=${STOCK_TOKEN}&cb=${cb}`;
    let done = false;
    const cleanup = () => { if(done) return; done = true; clearTimeout(timer); delete window[cb]; document.getElementById('jq_' + cb)?.remove(); };
    const timer = setTimeout(() => { cleanup(); resolve([]); }, 5000);
    window[cb] = data => {
      cleanup();
      resolve((data?.QuotationCodeTable?.Data || []).map(x => ({ Code:normalizeStockCode(x.Code), Name:normalizeStockName(x.Name) })).filter(x => x.Code));
    };
    const script = document.createElement('script');
    script.id = 'jq_' + cb;
    script.src = url;
    script.onerror = () => { cleanup(); resolve([]); };
    document.head.appendChild(script);
  });
}
async function searchStocks(q) {
  const local = searchLocalStocks(q);
  const exact = normalizeStockCode(q);
  let res = local.slice();
  if(res.length < 16) {
    const remote = await jsonpSearchEastmoney(q);
    for(const item of remote) if(!res.some(x => x.Code === item.Code)) res.push(item);
  }
  if(exact) res.sort((a,b) => (b.Code === exact) - (a.Code === exact));
  return res.slice(0, 16);
}
