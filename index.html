<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyGlance</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M3 12s2.5-6 9-6 9 6 9 6-2.5 6-9 6-9-6-9-6Z' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='12' cy='12' r='2.5' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --purple: #8b5cf6; --yellow: #f59e0b;
    --dark-bg: #020617; --sidebar-bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.4);
    --inner-bg: rgba(0, 0, 0, 0.3); --item-bg: rgba(255, 255, 255, 0.03);
    --border-color: rgba(255, 255, 255, 0.1); --text-main: #f1f5f9; --text-dim: #94a3b8;
    --page-padding: 24px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body { font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--dark-bg); color: var(--text-main); overflow: hidden; }

.header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--page-padding); background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.logo-box { background: linear-gradient(135deg, var(--blue), var(--purple)); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; font-size: 18px; }
.header-title { font-size: 18px; font-weight: 800; }
.header-center { background: var(--inner-bg); padding: 4px; border-radius: 12px; display: flex; gap: 4px; border: 1px solid rgba(255, 255, 255, 0.05); flex-shrink: 0; }
.nav-btn { padding: 6px 20px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.nav-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
.nav-btn.active { background: var(--blue); color: #fff; }
.header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

.main-container { display: flex; height: calc(100vh - 64px); min-height: 0; }
.chart-section { flex: 1; display: flex; flex-direction: column; padding: var(--page-padding); background: #000; min-width: 0; }
.chart-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; min-height: 40px; flex-shrink: 0; gap: 10px; }
.toolbar-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.toolbar-right { display: flex; align-items: center; gap: 8px; }

.range-tabs { background: var(--inner-bg); padding: 3px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-shrink: 0; }
.range-btn { padding: 4px 12px; border: none; background: transparent; color: var(--text-dim); font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 6px; }
.range-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
.range-btn.active { background: var(--blue); color: #fff; }

.btn-primary { padding: 6px 14px; border: 1px solid rgba(148, 163, 184, 0.3); background: rgba(255, 255, 255, 0.03); color: var(--text-dim); font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all .2s; }
.btn-primary:hover { background: rgba(255, 255, 255, 0.08); color: #fff; border-color: rgba(255, 255, 255, 0.2); }
.btn-primary:active { background: rgba(255, 255, 255, 0.12); }
.icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 6px; border-radius: 6px; transition: all .2s; display: flex; align-items: center; justify-content: center; }
.icon-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
.icon-btn .icon { width: 18px; height: 18px; }
.icon.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.ma-selector { display: flex; gap: 8px; align-items: center; padding-left: 15px; border-left: 1px solid var(--border-color); flex-wrap: wrap; }
.ma-checkbox { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
.ma-checkbox:hover { color: #fff; }
.ma-checkbox input { display: none; }
.ma-checkbox .check-box { width: 12px; height: 12px; border: 1px solid var(--text-dim); border-radius: 3px; }
.ma-checkbox input:checked + .check-box { background: var(--blue); border-color: var(--blue); }

.integrated-container { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--border-color); background: #0b0f1a; border-radius: 16px; overflow: hidden; min-height: 0; }
.main-chart-box { flex: 5; position: relative; min-height: 0; }
.volume-chart-box { flex: 1.5; position: relative; border-top: 1px solid var(--border-color); min-height: 0; }
.macd-chart-box { flex: 1.5; position: relative; border-top: 1px solid var(--border-color); min-height: 0; }
.kdj-chart-box { flex: 1.5; position: relative; border-top: 1px solid var(--border-color); min-height: 0; }
.main-chart-box canvas, .volume-chart-box canvas, .macd-chart-box canvas, .kdj-chart-box canvas { width: 100% !important; height: 100% !important; }

.info-section { width: 380px; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 18px; gap: 14px; overflow-y: auto; background: var(--sidebar-bg); flex-shrink: 0; }
.card { background: var(--card-bg); border-radius: 16px; padding: 15px; border: 1px solid var(--border-color); }
.nav-capsule { background: var(--inner-bg); border-radius: 8px; padding: 2px; border: 1px solid var(--border-color); display: flex; }
.nav-capsule .btn-sm { height: 26px; border: none; background: transparent; color: var(--text-dim); padding: 0 8px; font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 6px; min-width: 28px; }
.nav-capsule .btn-sm:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
.nav-capsule .btn-sm.active { background: var(--blue); color: #fff; }

.price-hero-compact { display: flex; align-items: baseline; gap: 12px; margin: 8px 0; flex-wrap: wrap; }
.price-main { font-size: 34px; font-weight: 900; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; line-height: 1; }
.price-sub { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.data-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--inner-bg); border-radius: 8px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
.data-item-mini { background: transparent; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.data-label-mini { color: var(--text-dim); font-size: 9px; font-weight: 600; text-transform: uppercase; }
.data-value-mini { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono'; color: #fff; }
.amt-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding: 0 4px; }
.amt-label { font-size: 10px; color: var(--text-dim); font-weight: 600; }
.amt-value { font-size: 12px; font-weight: 800; font-family: 'JetBrains Mono'; color: var(--blue); }
.data-note { margin-top: 8px; font-size: 10px; color: #64748b; line-height: 1.5; }

.signal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
.badge.bull { background: rgba(59, 130, 246, 0.15); color: var(--blue); }
.badge.bear { background: rgba(239, 68, 68, 0.15); color: var(--red); }
.badge.neutral { background: rgba(255, 255, 255, 0.1); color: var(--text-dim); }
.logic-line { font-size: 12px; line-height: 1.7; color: #cbd5e1; margin-bottom: 10px; }
.key-levels { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255, 255, 255, 0.1); }
.level-item { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; }
.level-val { font-family: 'JetBrains Mono'; font-weight: 700; color: #fff; margin-left: 4px; }
.risk-note { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255, 255, 255, 0.08); color: #64748b; font-size: 10px; line-height: 1.6; }
.decision-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.decision-box { padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); }
.decision-box .label { font-size: 9px; color: #94a3b8; font-weight: 800; margin-bottom: 5px; }
.decision-box .value { font-size: 13px; color: #f8fafc; font-weight: 900; line-height: 1.35; overflow-wrap: anywhere; }
.decision-box .hint { font-size: 10px; color: #94a3b8; margin-top: 4px; line-height: 1.4; }
.signal-section-title { font-size: 10px; font-weight: 900; margin: 12px 0 6px; }
.signal-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0 4px 8px; border-left: 2px solid #475569; font-size: 11px; }
.signal-row .name { color: #cbd5e1; }
.signal-row .tag { flex-shrink: 0; background: rgba(148,163,184,0.18); color: #94a3b8; padding: 1px 5px; border-radius: 4px; font-size: 9px; }
.reason-list { margin-top: 10px; padding: 10px 10px 10px 12px; border-left: 2px solid rgba(245,158,11,0.5); background: rgba(245,158,11,0.045); border-radius: 0 8px 8px 0; }
.reason-list div { font-size: 11px; color: #e2e8f0; line-height: 1.65; }

#loading { position: fixed; inset: 0; background: var(--dark-bg); display: flex; align-items: center; justify-content: center; z-index: 9999; color: var(--blue); font-size: 14px; letter-spacing: 4px; font-weight: 900; }
.up { color: var(--red) !important; }
.down { color: var(--green) !important; }

#settingsOverlay, #helpOverlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 9998; display: none; align-items: center; justify-content: center; padding: 20px; }
#settingsOverlay.show, #helpOverlay.show { display: flex; }
#settingsPanel, #helpPanel { position: relative; display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.92)); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.06); border-radius: 16px; max-width: 540px; width: 90%; max-height: 85vh; overflow: hidden; }
#helpPanel { max-width: 800px; }
.sg-header { padding: 24px 24px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); flex-shrink: 0; }
.sg-header h3, .sg-header h2 { font-size: 14px; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: 0.5px; }
.sg-body { flex: 1; padding: 16px 24px; overflow-y: auto; }
.sg-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: color .2s, background .2s; line-height: 1; }
.sg-close:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.06); }
.sg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.sg-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 10px 12px; }
.sg-card.full { grid-column: 1 / -1; }
.sg-card-title { font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
.sg-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
.sg-label { color: #94a3b8; }
.sg-val { color: var(--text-main); font-family: JetBrains Mono; font-weight: 700; text-align: right; }
.sg-strategy { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sg-strategy button { padding: 10px 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-dim); border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all .25s; text-align: center; position: relative; overflow: hidden; }
.sg-strategy button::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--blue); opacity: 0; transition: opacity .25s; }
.sg-strategy button:hover { border-color: rgba(59, 130, 246, 0.25); color: #fff; background: rgba(255, 255, 255, 0.02); }
.sg-strategy button.active { background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.3); color: #fff; }
.sg-strategy button.active::before { opacity: 1; }
.sg-strategy button .sg-desc { display: block; font-weight: 400; font-size: 9px; color: var(--text-dim); margin-top: 5px; line-height: 1.4; }
.sg-strategy button.active .sg-desc { color: rgba(255, 255, 255, 0.6); }

.stock-search { position: relative; width: 100%; }
.stock-search input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; color: var(--text-main); font-size: 13px; font-weight: 600; outline: none; }
.stock-search input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
.stock-search input::placeholder { color: var(--text-dim); font-weight: 400; }
.stock-suggest { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; margin-top: 4px; max-height: 260px; overflow-y: auto; display: none; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }
.stock-suggest-item { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.04); transition: background .15s; }
.stock-suggest-item:last-child { border-bottom: none; }
.stock-suggest-item:hover, .stock-suggest-item.active { background: rgba(59, 130, 246, 0.12); }
.stock-suggest-item .ss-name { font-size: 13px; font-weight: 600; color: #f1f5f9; }
.stock-suggest-item .ss-code { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #94a3b8; }
.stock-suggest-empty { padding: 20px; text-align: center; color: #64748b; font-size: 12px; }

.stock-header { display: flex; align-items: center; margin-bottom: 8px; }
.stock-header .title-wrap span:first-child { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
.stock-item { display: flex; align-items: center; padding: 9px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; transition: background .15s;}
.stock-item:hover { background: rgba(59, 130, 246, 0.08); }
.stock-item.active { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.25); }
.stock-item .sname { flex: 1; font-size: 13px; font-weight: 700; }
.stock-item .scode { font-size: 10px; color: var(--text-dim); font-family: JetBrains Mono; margin-right: 10px; }
.stock-item .sprice { font-size: 12px; font-weight: 800; font-family: JetBrains Mono; }
.stock-item .schange { font-size: 10px; font-weight: 700; font-family: JetBrains Mono; width: 52px; text-align: right; }
.wl-close { font-size: 14px; color: var(--text-dim); cursor: pointer; opacity: 0; padding: 0 4px; }
.stock-item:hover .wl-close { opacity: 1; }
.wl-close:hover { color: var(--red); }
.stock-empty { padding: 20px 0; text-align: center; color: var(--text-dim); font-size: 11px; line-height: 1.8; }
.stock-empty strong { display: block; color: #cbd5e1; font-size: 12px; margin-bottom: 4px; }

/* Custom Modal Styles */
#customModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center; }
.custom-modal-box { background:#0f172a; padding:24px; border-radius:12px; border:1px solid #334155; min-width:320px; max-width: 90%; max-height: 90vh; overflow-y: auto; box-shadow:0 20px 40px rgba(0,0,0,0.4); text-align:center; }
.custom-modal-msg { margin-bottom:24px; color:#f1f5f9; font-size:14px; line-height:1.6; text-align: left;}
.custom-modal-btns { display:flex; gap:12px; justify-content:center; }
.custom-modal-btn { padding:8px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-cancel { background:transparent; border:1px solid #475569; color:#94a3b8; }
.btn-cancel:hover { background:rgba(255,255,255,0.05); color:#fff; }
.btn-ok { background:var(--blue); border:none; color:#fff; }
.btn-ok:hover { background:#2563eb; }

@media (max-width: 1024px) { .info-section { width: 320px; } .price-main { font-size: 28px; } }
@media (max-width: 768px) {
    html, body { height: auto; min-height: 100%; }
    body { overflow-y: auto; overflow-x: hidden; }
    .header { height: auto; min-height: 64px; padding: 8px 10px; gap: 8px; flex-wrap: wrap; position: sticky; top: 0; z-index: 20; }
    .header-left { gap: 8px; }
    .header-title { display: none; }
    .header-center { order: 2; flex: 1 1 100%; justify-content: center; min-width: 0; gap: 3px; }
    .header-right { margin-left: auto; gap: 8px; }
    .nav-btn { padding: 6px 6px; font-size: 11px; flex: 1 1 0; min-width: 0; }
    .main-container { flex-direction: column; height: auto; min-height: calc(100vh - 64px); overflow: visible; }
    .chart-section { padding: 12px; min-height: 760px; flex: none; }
    .chart-toolbar { align-items: flex-start; }
    .toolbar-left { gap: 8px; width: 100%; }
    .toolbar-right { margin-left: auto; }
    .ma-selector { width: 100%; padding-left: 0; border-left: none; gap: 7px; }
    .integrated-container { min-height: 560px; flex: none; }
    .info-section { width: 100%; max-height: none; border-left: none; border-top: 1px solid var(--border-color); padding: 12px; overflow: visible; }
    .card { border-radius: 12px; padding: 14px; }
    #settingsPanel, #helpPanel { width: 96%; max-height: 88vh; }
    .sg-grid, .sg-strategy { grid-template-columns: 1fr; }
    .decision-summary { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="loading">DailyGlance 系统同步中...</div>

<!-- Custom Global Modal -->
<div id="customModal">
    <div class="custom-modal-box">
        <div id="customModalMsg" class="custom-modal-msg"></div>
        <div class="custom-modal-btns">
            <button id="customModalBtnCancel" class="custom-modal-btn btn-cancel">取消</button>
            <button id="customModalBtnOk" class="custom-modal-btn btn-ok">确定</button>
        </div>
    </div>
</div>

<!-- Overlay for Settings -->
<div id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
    <div id="settingsPanel"></div>
</div>

<!-- Overlay for Help -->
<div id="helpOverlay" onclick="if(event.target===this)toggleHelp()">
    <div id="helpPanel">
        <button class="sg-close" onclick="toggleHelp()">×</button>
        <div class="sg-header"><h2>使用与数据说明</h2></div>
        <div class="sg-body" style="color:var(--text-dim);font-size:14px;line-height:1.8;">
            <h3 style="color:var(--text-main);margin-top:10px;">如何阅读决策卡</h3>
            <div style="background:rgba(255,255,255,0.05);padding:15px;border-radius:8px;margin:10px 0;">
                <p style="margin:0 0 10px 0;color:#3b82f6;font-weight:600;">决策状态</p>
                <p style="margin:8px 0 0 0;font-size:12px;color:var(--text-dim);">用于快速判断当前标的处于强势、观望、风险预警或离场状态。最终建议会叠加上证、创业板、中证1000、科创50的市场温度、风险评分和关键价位，不代表确定收益。</p>
            </div>
            <div style="background:rgba(255,255,255,0.05);padding:15px;border-radius:8px;margin:10px 0;">
                <p style="margin:0 0 10px 0;color:#22c55e;font-weight:600;">策略积分与仓位</p>
                <p style="margin:8px 0 0 0;font-size:12px;color:var(--text-dim);">日线会累积买入积分，离场信号会清空动能并进入冷静期。周线只判断大方向、位置和趋势修复，不输出买卖积分。</p>
            </div>
        </div>
    </div>
</div>

<header class="header">
    <div class="header-left">
        <div class="logo-box">
            <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 12s2.5-6 9-6 9 6 9 6-2.5 6-9 6-9-6-9-6Z" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="2.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="header-title">DailyGlance</div>
    </div>
    
    <div class="header-center" id="indexTabs">
        <button class="nav-btn active" data-id="sh">上证</button>
        <button class="nav-btn" data-id="cy">创业</button>

    if(!data || !data.length) return -1;
    if(!date) return data.length - 1;
    let exact = data.findIndex(d => d.date === date);
    if(exact >= 0) return exact;
    for(let i=data.length-1; i>=0; i--) if(data[i].date <= date) return i;

}

        } else {
            currentWeek.date = d.date; currentWeek.high = Math.max(currentWeek.high, d.high); currentWeek.low = Math.min(currentWeek.low, d.low);
            currentWeek.close = d.close; currentWeek.vol += d.vol; currentWeek.amt += d.amt;
        }
    }
    if (currentWeek) weekly.push(currentWeek); return weekly;
}

async function syncDataIncremental(id) { 
    try { 
        const cached = await dbGet(id); 
        if(!cached || !cached.data || !cached.data.length) return await syncDataWithHistory(id); 

        const fresh = await syncDataWithHistory(id); 
        if(!fresh || !fresh.length) return cached.data; 

        const lastCached = cached.data[cached.data.length - 1];
        const matchingFresh = fresh.find(d => d.date === lastCached.date);
        
        if (matchingFresh && Math.abs(matchingFresh.close - lastCached.close) / lastCached.close > SYS_CONFIG.EX_RIGHT_TOLERANCE) {
            console.warn(`[系统风控] 监测到 ${id} 除权除息，执行全量覆盖。`);
            return fresh; 
        }

        const mergedMap = new Map(); 
        cached.data.forEach(item => mergedMap.set(item.date, item)); 
        fresh.forEach(item => mergedMap.set(item.date, item)); 
        return Array.from(mergedMap.values()).sort((a, b) => a.date.localeCompare(b.date)); 
    } catch(e) { 
        return await getCachedData(id) || null; 
    } 
}

async function syncData(id) { 
    const cached = await getCachedData(id); 
    const now = new Date(); 
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`; 
    const hasEnough = cached && cached.length>=30; 
    
    if(isMarketOpen()) { 
        if(hasEnough) { 
            const incremental = await syncDataIncremental(id); 
            if(incremental && incremental.length > 0) { 
                await dbSet(id, incremental); 
                cached.length = 0; 
                Array.prototype.push.apply(cached, incremental); 
            } 
            const rt = await requestManager.fetchRealtimeWithThrottle(id); 
            if(rt) { 
                if(cached[cached.length-1].date === today) { 
                    cached[cached.length-1] = rt; 
                } else { 
                    cached.push(rt); 
                } 
                await dbSet(id, cached); 
            } 
            return cached; 
        } 
        const data = await syncDataWithHistory(id); 
        if(data && data.length>=30) { await dbSet(id, data); return data; } 
        return hasEnough ? cached : null; 
    } else { 
        if(hasEnough) { 
            const incremental = await syncDataIncremental(id); 
            if(incremental && incremental.length > 0) { 
                await dbSet(id, incremental); 
                return incremental; 
            } 
            return cached; 
        } 
        const data = await syncDataWithHistory(id); 
        if(data && data.length>=30) { 
            await dbSet(id, data); 
            return data; 
        } 
        return null; 
    } 
}

function openDB() { 
    return new Promise(resolve => { 
        const req = indexedDB.open(DB_NAME, DB_VER); 
        req.onupgradeneeded = e => { 
            if (!e.target.result.objectStoreNames.contains(STORE)) {
                e.target.result.createObjectStore(STORE, { keyPath: 'id' }); 
            }
        }; 
        req.onsuccess = e => { DB = e.target.result; resolve(); }; 
        req.onerror = () => resolve(); 
    }); 
}

function dbGet(id) { 
    return new Promise(resolve => { 
        if(!DB) return resolve(null); 
        const req = DB.transaction(STORE, 'readonly').objectStore(STORE).get(id); 
        req.onsuccess = e => resolve(e.target.result); 
        req.onerror = () => resolve(null); 
    }); 
}

function dbSet(id, data) { 
    return new Promise(resolve => { 
        if(!DB) return resolve(); 
        const tx = DB.transaction(STORE, 'readwrite'); 
        tx.objectStore(STORE).put({ id, data, updated: Date.now() }); 
        tx.oncomplete = () => resolve(); 
        tx.onerror = () => resolve(); 
    }); 
}

const Calcs = {
    ma: (data, n) => {
        let r = [];
        for (let i = 0; i < data.length; i++) {
            if (i < n - 1) {
                r.push(null);
                continue;
            }
            let s = 0;
            for (let j = 0; j < n; j++) {
                s += data[i - j].close;
            }
            r.push(s / n);
        }
        return r;
    },
    macd: (data) => {
        let e12 = [], e26 = [], diff = [], dea = [], bar = [];
        for (let i = 0; i < data.length; i++) {
            let c = data[i].close;
            if (i === 0) {
                e12[i] = e26[i] = c;
            } else {
                e12[i] = c * 2 / 13 + e12[i - 1] * 11 / 13;
                e26[i] = c * 2 / 27 + e26[i - 1] * 25 / 27;
            }
            diff[i] = e12[i] - e26[i];
            dea[i] = (i === 0) ? diff[i] : (diff[i] * 2 / 11 + dea[i - 1] * 9 / 11);
            bar[i] = diff[i] - dea[i];
        }
        return { _e12: e12, _e26: e26, diff, dea, bar };
    },
    rsi: (data, n = 14) => {
        let r = [], g = [0], l = [0], ag = [0], al = [0];
        for (let i = 1; i < data.length; i++) {
            let d = data[i].close - data[i - 1].close;
            g.push(d > 0 ? d : 0);
            l.push(d < 0 ? -d : 0);
        }
        for (let i = 0; i < data.length; i++) {
            if (i < n) {
                ag[i] = ag[i - 1] || 0;
                al[i] = al[i - 1] || 0;
                r.push(null);
            } else if (i === n) {
                ag[i] = g.slice(1, n + 1).reduce((a, b) => a + b) / n;
                al[i] = l.slice(1, n + 1).reduce((a, b) => a + b) / n;
                r.push(100 - 100 / (1 + (ag[i] / (al[i] || 0.0001))));
            } else {
                ag[i] = (ag[i - 1] * (n - 1) + g[i]) / n;
                al[i] = (al[i - 1] * (n - 1) + l[i]) / n;
                r.push(100 - 100 / (1 + (ag[i] / (al[i] || 0.0001))));
            }
        }
        return { val: r, _g: g, _l: l, _ag: ag, _al: al };
    },
    kdj: (data, n = 9) => {
        let k = [], d = [], j = [];
        let prevK = 50, prevD = 50;
        for (let i = 0; i < data.length; i++) {
            if (i < n - 1) {
                k.push(null); d.push(null); j.push(null);
                continue;
            }
            let slice = data.slice(i - n + 1, i + 1);
            let hn = Math.max(...slice.map(v => v.high));
            let ln = Math.min(...slice.map(v => v.low));
            let rsv = hn === ln ? 50 : (data[i].close - ln) / (hn - ln) * 100;
            let curK = (2 / 3) * prevK + (1 / 3) * rsv;
            let curD = (2 / 3) * prevD + (1 / 3) * curK;
            let curJ = 3 * curK - 2 * curD;
            k.push(curK); d.push(curD); j.push(curJ);
            prevK = curK; prevD = curD;
        }
        return { k, d, j };
    }
};

function calculateBollinger(data, idx) { 
    if(idx<19) return null; 
    const slice=data.slice(idx-19,idx+1);
    const avg=slice.reduce((s,d)=>s+d.close,0)/20; 
    const std=Math.sqrt(slice.reduce((s,d)=>s+Math.pow(d.close-avg,2),0)/20); 
    return { middle: avg, upper: avg+2*std, lower: avg-2*std }; 
}

function getWeeklyData(full, idx) { 
    if(idx<24) return null; 
    const weeks=[]; 
    for(let i=0;i<=idx;i+=5){ 
        const wd=full.slice(i, Math.min(i+5, idx+1)); 
        if(wd.length) weeks.push({ close:wd[wd.length-1].close, vol:wd.reduce((s,d)=>s+d.vol,0) }); 
    } 
    if(weeks.length<5) return null; 
    const cur=weeks[weeks.length-1], prev=weeks[weeks.length-2]; 
    const ma5w=weeks.slice(-5).reduce((s,w)=>s+w.close,0)/5; 
    const avgPrevVol=weeks.slice(Math.max(0,weeks.length-5),weeks.length-1).reduce((s,w)=>s+w.vol,0)/Math.min(4,weeks.length-1); 
    return { aboveMA5W: cur.close>ma5w && prev.close<=ma5w, volUp: avgPrevVol>0 && cur.vol>avgPrevVol*1.2 }; 
}

function checkPlatformBreak(full, idx) { 
    if(idx<20) return false; 
    const pd=full.slice(idx-19,idx+1), ph=Math.max(...pd.map(d=>d.high)), pl=Math.min(...pd.map(d=>d.low)); 
    return (ph-pl)/pl < 0.08 && full[idx].close>=ph; 
}

function checkRecentDeadCross(full, ma5, ma20, idx) { 
    if(idx<6) return false; 
    for(let i=idx-5; i<idx; i++) {
        if(ma5[i]&&ma20[i]&&ma5[i]<ma20[i]) return true; 
    }
    return false; 
}

function checkConfirmedHighPullback(full, ind, idx, high20, prev) {
    if(high20 === Infinity || idx < 20) return false;
    const item = full[idx], atr = getATR(full, idx), atrPct = item.close ? atr / item.close : 0;
    const threshold = state.mode === 'stock' ? Math.max(0.08, atrPct * 2.5) : 0.05;
    const pullback = (high20 - item.close) / high20;
    const prevPullback = prev ? (high20 - prev.close) / high20 : 0;
    const recentLow = Math.min(...full.slice(Math.max(0, idx-10), idx).map(d=>d.low));
    const ma20 = ind.ma[20]?.[idx];
    const brokeMA20 = ma20 && item.close < ma20;
    const brokeRecentLow = recentLow && item.close < recentLow;
    return pullback >= threshold && prevPullback < threshold && (brokeMA20 || brokeRecentLow);
}

class SignalContext {
    constructor(idx, full, ind, state) {
        this.idx = idx; this.full = full; this.ind = ind; this.state = state;
        this.item = full[idx]; this.prev = full[idx-1]; 
        this.prev2 = full[idx-2]; this.prev3 = full[idx-3];
        
        this.ma5 = ind.ma[5]?.[idx]; this.ma10 = ind.ma[10]?.[idx]; this.ma20 = ind.ma[20]?.[idx]; this.ma60 = ind.ma[60]?.[idx];
        this.prevMa5 = ind.ma[5]?.[idx-1]; this.prevMa10 = ind.ma[10]?.[idx-1]; this.prevMa20 = ind.ma[20]?.[idx-1]; this.prevMa60 = ind.ma[60]?.[idx-1];
        
        this.dif = ind.macd.diff[idx]; this.dea = ind.macd.dea[idx];
        this.prevDif = ind.macd.diff[idx-1]; this.prevDea = ind.macd.dea[idx-1];
        this.rsiVal = ind.rsi.val[idx] || 50; this.prevRsi = ind.rsi.val[idx-1] || 50;
    }

    get volRatio() {
        if(this._volRatio !== undefined) return this._volRatio;
        const volSum = this.full.slice(Math.max(0, this.idx-4), this.idx+1).reduce((s,d)=>s+d.vol,0);
        return (this._volRatio = this.item.vol / (volSum / 5));
    }
    get isLongToday() { return this.ma5 > this.ma10 && this.ma10 > this.ma20 && this.ma20 > this.ma60; }
    get isLongPrev() { return this.prevMa5 > this.prevMa10 && this.prevMa10 > this.prevMa20 && this.prevMa20 > this.prevMa60; }
    get lookback20() { return this._lb20 || (this._lb20 = this.full.slice(Math.max(0, this.idx-20), this.idx)); }
    get high20() { return this.lookback20.length ? Math.max(...this.lookback20.map(d=>d.high)) : Infinity; }
    get shadowBelow() { return this.ma20 ? Math.max(0, Math.min(this.item.open, this.item.close) - this.item.low) : 0; }
    get body() { return Math.abs(this.item.close - this.item.open); }
    get kdj() { return {K: this.ind.kdj.k[this.idx], D: this.ind.kdj.d[this.idx], J: this.ind.kdj.j[this.idx], prevK: this.ind.kdj.k[this.idx-1]||50, prevD: this.ind.kdj.d[this.idx-1]||50}; }
    get lookback30() { return this._lb30 || (this._lb30 = this.full.slice(Math.max(0, this.idx-30), this.idx)); }
    get wd() { return this._wd || (this._wd = getWeeklyData(this.full, this.idx)); }
    get lookback100() { return this._lb100 || (this._lb100 = this.full.slice(Math.max(0, this.idx-100), this.idx)); }
    get weeklySupport() { return this.lookback100.length ? Math.min(...this.lookback100.map(d=>d.low)) : 0; }
    get boll() { return this._boll || (this._boll = calculateBollinger(this.full, this.idx)); }
    get consecutiveBullish() {
        if(this._cb !== undefined) return this._cb;
        let c = 0;
        for(let i = this.idx-1; i >= Math.max(0, this.idx-5); i--) { if(this.full[i].close > this.full[i].open) c++; else break; }
        return (this._cb = c);
    }
}

const SIGNAL_RULES = [
    { id: 'B1', check: ctx => ctx.isLongToday && !ctx.isLongPrev },
    { id: 'B2', check: ctx => ctx.prevDif <= ctx.prevDea && ctx.dif > ctx.dea },
    { id: 'B3', check: ctx => (ctx.prev && ctx.prev.close <= ctx.prevMa20 && ctx.item.close > ctx.ma20) || (ctx.prevMa5 <= ctx.prevMa20 && ctx.ma5 > ctx.ma20) },
    { id: 'B4', check: ctx => ctx.item.close > ctx.high20 && ctx.volRatio > SYS_CONFIG.VOL_SURGE_RATIO },

    { id: 'B6', check: ctx => ctx.item.low <= ctx.ma20 && ctx.item.close >= ctx.ma20 && ctx.shadowBelow >= ctx.body * 1.5 && ctx.volRatio < SYS_CONFIG.VOL_SHRINK_RATIO },
    { id: 'B7', check: ctx => ctx.prevRsi <= 30 && ctx.rsiVal > 30 },
    { id: 'B8', check: ctx => ctx.kdj && ctx.kdj.prevK <= ctx.kdj.prevD && ctx.kdj.K > ctx.kdj.D },

    { id: 'B10', check: ctx => ctx.ma20 > ctx.ma60 && ctx.prevMa20 <= ctx.prevMa60 },
    { id: 'B11', check: ctx => ctx.item.low <= ctx.ma20 && ctx.item.close > ctx.ma20 && ctx.item.close > ctx.item.open && ctx.ma20 > ctx.prevMa20 },
    { id: 'B12', check: ctx => ctx.dif > 0 && ctx.dea > 0 && ctx.prevDif <= ctx.prevDea && ctx.dif > ctx.dea },
    { id: 'B13', check: ctx => ctx.wd && ctx.wd.aboveMA5W && ctx.wd.volUp },

    { id: 'B15', check: ctx => ctx.prevMa5 <= ctx.prevMa20 && ctx.ma5 > ctx.ma20 && checkRecentDeadCross(ctx.full, ctx.ind.ma[5], ctx.ind.ma[20], ctx.idx) },
    { id: 'B16', check: ctx => ctx.weeklySupport > 0 && ctx.item.low <= ctx.weeklySupport * 1.03 && ctx.item.close > ctx.item.open && ctx.item.close > ctx.weeklySupport },
    
    { id: 'L1', check: ctx => ctx.prev && ctx.prev.close >= ctx.prevMa10 && ctx.item.close < ctx.ma10 && ctx.ma5 < ctx.prevMa5 },
    { id: 'L2', check: ctx => ctx.prevMa5 >= ctx.prevMa20 && ctx.ma5 < ctx.ma20 },
    { id: 'L3', check: ctx => ctx.prevDif >= ctx.prevDea && ctx.dif < ctx.dea },
    { id: 'L4', check: ctx => ctx.prev && ctx.prev.close >= ctx.prevMa20 && ctx.item.close < ctx.ma20 && ctx.volRatio > SYS_CONFIG.VOL_SURGE_RATIO },
    { id: 'L5', check: ctx => ctx.prev && ctx.prev.close > ctx.prev.open && ctx.item.close < ctx.item.open && ctx.item.open > ctx.prev.close && ctx.item.close < ctx.prev.open },
    { id: 'L6', check: ctx => ctx.consecutiveBullish >= 3 && ctx.item.close < ctx.item.open && ctx.volRatio > 1.2 },
    { id: 'L7', check: ctx => ctx.prevRsi >= 70 && ctx.rsiVal < 70 },
    { id: 'L8', check: ctx => ctx.boll && ctx.item.high >= ctx.boll.upper && ctx.item.close < ctx.boll.upper && ctx.item.close < ctx.item.open },
    { id: 'L9', check: ctx => ctx.state.period !== 'weekly' && checkConfirmedHighPullback(ctx.full, ctx.ind, ctx.idx, ctx.high20, ctx.prev) },
    { id: 'L10', check: ctx => ctx.lookback30.length > 0 && ctx.item.high >= Math.max(...ctx.lookback30.map(d=>d.high)) && ctx.dif < Math.max(...ctx.ind.macd.diff.slice(Math.max(0,ctx.idx-30),ctx.idx)) && ctx.dif < ctx.prevDif },
    
    { id: 'W1', check: ctx => ctx.ma60 > 0 && (ctx.item.close - ctx.ma60) / ctx.ma60 > 0.25 },
    // 🚀 核心修复1：W2 增加真正的缩量逻辑 ctx.item.vol < ctx.prev.vol
    { id: 'W2', check: ctx => ctx.prev && ctx.prev2 && ctx.prev3 && ctx.prev.close > ctx.prev.open && ctx.prev2.close > ctx.prev2.open && ctx.item.close > ctx.item.open && ctx.prev.vol > ctx.prev2.vol && ctx.item.vol < ctx.prev.vol }
];

function calculateDailySignals(idx, full, ind) {
    if(idx < 60) return [];
    const ctx = new SignalContext(idx, full, ind, state);
    const result = [];
    for (let i = 0; i < SIGNAL_RULES.length; i++) {
        if (SIGNAL_RULES[i].check(ctx)) result.push(SIGNAL_RULES[i].id);
    }
    return result;
}

function calculateAllSignals(idx, full, ind) {
    if(idx<60) return { buySignals:[], exitSignals:[], allSignals:{}, windowScore:0 };
    const rawSigs = full[idx]._signals || calculateDailySignals(idx, full, ind);
    const signals = {}; 
    rawSigs.forEach(s => { signals[s] = {status:true, score:SIGNAL_SCORES[s]||0}; });
    
    const S = STRATEGY;
    const activeBuySignals = rawSigs.filter(s => S.buySignals.includes(s));
    const activeExitSignals = rawSigs.filter(s => S.exitSignals.includes(s));
    
    const coreExitSignals = ['L3', 'L4', 'L5', 'L9', 'L10'];
    let lastExitIdx = -1;
    for(let i = idx; i >= Math.max(0, idx - 60); i--) {
        const dSigs = full[i]._signals || [];
        if(dSigs.some(s => s.startsWith('L') && S.exitSignals.includes(s) && coreExitSignals.includes(s))) { 
            lastExitIdx = i; break; 
        }
    }
    
    let inCooldown = false, daysSinceExit = Infinity;
    if(lastExitIdx >= 0 && lastExitIdx < idx) { 
        daysSinceExit = idx - lastExitIdx; 
        if(daysSinceExit <= 3) { inCooldown = true; } 
    }
    
    let windowSignals = []; 
    const usedSignals = new Set(), groupBest = new Map();
    const windowStart = Math.max(0, idx - S.windowDays + 1);
    
    for(let i = windowStart; i <= idx; i++) {
        const daySigs = full[i]._signals || [];
        daySigs.forEach(sig => {
            if(!usedSignals.has(sig)) {
                if(sig.startsWith('L') && S.exitSignals.includes(sig)) { 
                    windowSignals.push({day:i, signal:sig}); 
                    usedSignals.add(sig); 
                }
                else if(sig.startsWith('B') && S.buySignals.includes(sig)) {
                    if (i > lastExitIdx) {
                        let isFailed = false;
                        if (i < idx && full[idx].close < full[i].low) isFailed = true;
                        if (!isFailed) {
                            const score = getSignalScore(sig, S), groupKey = getScoreGroupKey(S, sig);
                            const existing = groupBest.get(groupKey);
                            if(!existing || score > existing.score) {
                                groupBest.set(groupKey, { score, signal:sig });
                            }
                            windowSignals.push({day:i, signal:sig});
                            usedSignals.add(sig);
                        }
                    }
                }
            }
        });
    }
    const windowScore = Array.from(groupBest.values()).reduce((sum, item) => sum + item.score, 0);
    return { buySignals: activeBuySignals, exitSignals: activeExitSignals, allSignals: signals, windowScore, windowSignals, inCooldown, cooldownDays: 3, daysSinceExit };
}

function checkUnconditionalExit(idx, full, ind) {
    if(idx<5 || !(full[idx]._signals||[]).includes('L3')) return false;
    for(let i=idx-1; i>=Math.max(0,idx-4); i--) {
        if((full[i]._signals||[]).includes('L10')) return true;
    }
    return false;
}

function getSignalMeta(idx, full, ind) {
    const sigs = calculateAllSignals(idx, full, ind), S = STRATEGY;
    const hasUncond = checkUnconditionalExit(idx, full, ind);
    const warns = Object.keys(sigs.allSignals).filter(s=>S.warningSignals?.includes(s));
    const strongExits = sigs.exitSignals.filter(s => ['L3', 'L4', 'L5', 'L9', 'L10'].includes(s));
    
    let type, cls, detail, logic;
    if(hasUncond) { type='🛑 清仓规避'; cls='core'; detail='顶背离后MACD死叉'; logic='触发高危清仓信号'; }
    else if(strongExits.length > 0) { type='🚪 趋势破位'; cls='core'; detail='触发核心破位防守'; logic='防守: '+strongExits.join(','); }
    else if(sigs.inCooldown) { type='⏸️ 离场观望'; cls='regular'; detail=`结构已破位，冷静期剩余${3-sigs.daysSinceExit}天`; logic=`动能清零，需重新积攒`; }
    else if(sigs.windowScore>=S.buyThreshold && warns.length) { type='⚠️ 谨慎看多'; cls='core'; detail='买入积分达标但伴随过热风险'; logic=warns.join(','); }
    else if(sigs.windowScore>=S.buyThreshold) { type='✅ 明确转强'; cls='core'; detail=`积分:${sigs.windowScore} 达到买入条件`; logic='做多信号: '+(sigs.buySignals.join(',')||'历史积分'); }
    else if(sigs.windowScore>=Math.max(3, S.buyThreshold-2)) { type='👀 关注异动'; cls='regular'; detail=`当前积分:${sigs.windowScore}，即将达标`; logic='接近转强，可列入观察'; }
    else if(full[idx].close > (ind.ma[20]?.[idx] || Infinity)) { type='📈 趋势抱单'; cls='regular'; detail='依托均线多头结构持仓'; logic='虽无新买点，但大趋势完好'; }
    else { type='👀 弱势震荡'; cls='regular'; detail='积分不足，缺乏上行动能'; logic='耐心等待放量或信号确认'; }
    
    return { ...sigs, type, cls, detail, logic, warningSignals:warns, windowBuyCount:sigs.windowSignals.filter(w=>w.signal.startsWith('B')).length, windowExitCount:sigs.windowSignals.filter(w=>w.signal.startsWith('L')).length, triggeredSignals:[...sigs.buySignals, ...sigs.exitSignals] };
}

function getBasePosition(idx, full, ind, meta) {
    if(meta.type==='✅ 明确转强') return 80; 
    if(meta.type==='⚠️ 谨慎看多') return 50; 
    if(meta.type==='👀 关注异动') return 30; 
    if(meta.type==='📈 趋势抱单') { 
        const ma20 = ind.ma[20]?.[idx], ma60 = ind.ma[60]?.[idx]; 
        return (ma20 && ma60 && ma20 > ma60) ? 60 : 40; 
    }
    return 0;
}

function getATR(data, idx, n=14) {
    if(!data || idx < 1) return 0;
    const start = Math.max(1, idx - n + 1); let sum = 0, count = 0;
    for(let i=start; i<=idx; i++) {
        const prevClose = data[i-1].close;
        sum += Math.max(data[i].high - data[i].low, Math.abs(data[i].high - prevClose), Math.abs(data[i].low - prevClose));
        count++;
    }
    return count ? sum / count : 0;
}

function findDateIndex(data, date) {
    if(!data || !data.length) return -1;
    let idx = data.findIndex(d => d.date === date);
    if(idx >= 0) return idx;
    for(let i=data.length-1; i>=0; i--) if(data[i].date <= date) return i;
    return data.length - 1;
}

function getIndexTrend(id, date) {
    const data = state.period === 'weekly' ? state.weeklyData[id] : state.rawData[id];
    if(!data || data.length < 60) return null;
    const idx = findDateIndex(data, date), ma20 = Calcs.ma(data, 20), ma60 = Calcs.ma(data, 60);
    if(idx < 60 || !ma20[idx] || !ma60[idx]) return null;
    const close = data[idx].close, ma20Now = ma20[idx], ma60Now = ma60[idx], ma20Prev = ma20[Math.max(0, idx-5)] || ma20Now;
    let stateLabel = '震荡', score = 0;
    if(close > ma20Now && ma20Now > ma60Now && ma20Now >= ma20Prev) { stateLabel = '多头'; score = 1; }
    else if(close < ma20Now && ma20Now < ma60Now) { stateLabel = '空头'; score = -1; }
    return { id, name:getIndexConfig(id)?.name || id, role:getIndexConfig(id)?.role || '', state:stateLabel, score };
}

function getMarketContext(date) {
    const trends = INDEX_IDS.map(id => getIndexTrend(id, date)).filter(Boolean);
    if(!trends.length) return { label:'环境未知', cls:'neutral', coef:0.8, maxPosition:50, reason:'市场温度数据不足', trends:[] };
    const detail = trends.map(t=>`${t.name}:${t.state}`).join(' / ');
    if(trends.length < INDEX_IDS.length) {
        return { label:'环境待确认', cls:'neutral', coef:0.65, maxPosition:40, reason:`四指数市场温度尚未补齐`, trends, detail };
    }
    const bull = trends.filter(t=>t.score>0), bear = trends.filter(t=>t.score<0), neutral = trends.filter(t=>t.score===0);
    const smallRiskOn = trends.some(t=>['cy','zz1000','kc50'].includes(t.id) && t.score>0), mainWeak = trends.some(t=>t.id==='sh' && t.score<0);
    let label, cls, coef, maxPosition, reason;
    if(bull.length >= 3) { label='全面多头'; cls='bull'; coef=1; maxPosition=80; reason='主板、成长或小盘维度多数走强，市场风险偏好较好'; }
    else if(bear.length >= 3) { label='全面弱势'; cls='bear'; coef=0.3; maxPosition=20; reason='多数指数处于空头结构，日线信号应明显降权'; }
    else if(smallRiskOn && mainWeak) { label='结构性题材行情'; cls='neutral'; coef=0.75; maxPosition=50; reason='权重偏弱但成长/小盘仍有活跃度，适合轻仓精选'; }
    else if(bull.length >= 1 && bear.length === 0) { label='温和偏多'; cls='bull'; coef=0.85; maxPosition=60; reason='部分指数走强，但尚未形成全面共振'; }
    else { label='震荡分化'; cls='neutral'; coef=0.6; maxPosition=40; reason='指数间分化明显，日线信号以过滤和确认优先'; }
    return { label, cls, coef, maxPosition, reason, trends, detail };
}

function getRiskContext(idx, full, ind) {
    const item = full[idx], close = item.close, atr = getATR(full, idx), atrPct = close ? atr / close : 0;
    const ma20 = ind.ma[20]?.[idx], ma60 = ind.ma[60]?.[idx];
    const recent = full.slice(Math.max(0, idx-19), idx+1);
    const high20 = recent.length ? Math.max(...recent.map(d=>d.high)) : close;
    const low20 = recent.length ? Math.min(...recent.map(d=>d.low)) : close;
    const drawdown = high20 ? (high20 - close) / high20 : 0;
    const distMA20 = ma20 ? (close - ma20) / ma20 : 0;
    let score = 100; const flags = [];
    if(atrPct > 0.06) { score -= 25; flags.push('波动过高'); } else if(atrPct > 0.04) { score -= 15; flags.push('波动偏高'); } else if(atrPct > 0.025) score -= 8;
    if(distMA20 > 0.12) { score -= 20; flags.push('偏离MA20过远'); } else if(distMA20 > 0.08) { score -= 10; flags.push('短线偏热'); }
    if(distMA20 < -0.05) { score -= 18; flags.push('跌破MA20较深'); }
    if(drawdown > 0.12) { score -= 20; flags.push('回撤较深'); } else if(drawdown > 0.07) score -= 10;
    
    const level = score >= 80 ? '低波动/偏离' : score >= 60 ? '中等波动/偏离' : score >= 40 ? '高偏离风险' : '极端波动风险';
    const coef = score >= 80 ? 1 : score >= 60 ? 0.75 : score >= 40 ? 0.5 : 0.25;
    const stop = Math.max(low20, close - atr * 2);
    return { score: Math.max(0, Math.round(score)), level, coef, flags, atrPct, distMA20, drawdown, support: low20, pressure: high20, watch: ma20 || close, stop: Math.min(stop, close), ma60: ma60 || null };
}

function getExitSeverity(meta, idx, full, ind) {
    const exits = meta.exitSignals || [];
    const raw = Object.keys(meta.allSignals || {});
    
    if((meta.type && meta.type.includes('清仓规避')) || (raw.includes('L10') && raw.includes('L3'))) return { level:'清仓防守', detail:'顶背离叠加动能死叉，先保护本金' };
    if(exits.some(s => ['L3', 'L4', 'L5', 'L9', 'L10'].includes(s))) return { level:'强离场', detail:'今日触发强离场信号，不适合继续加仓' };
    if(exits.some(s => ['L1', 'L2', 'L6', 'L7', 'L8'].includes(s)) || (meta.warningSignals || []).length) return { level:'减仓观察', detail:'短线转弱或过热，适合降低仓位等待确认' };
    
    if (meta.windowSignals) {
        const recentExits = meta.windowSignals.filter(w => w.signal.startsWith('L') && (idx - w.day) >= 1 && (idx - w.day) <= 2);
        if (recentExits.length > 0 && ind.ma[5] && full[idx].close < ind.ma[5][idx]) {
            return { level:'延续防守', detail:'近期触发过防守信号且尚未站回5日线，继续压制仓位' };
        }
    }
    return { level:'无明确离场', detail:'暂未看到需要立即防守的核心离场信号' };
}

function roundPosition(v) { return Math.max(0, Math.min(80, Math.round(v / 10) * 10)); }

// 🚀 核心修复2：回测引擎 O(N²) 雪崩终极护盾 (决策缓存)
const decisionCache = new Map();

function getDecisionContext(idx, full, ind, meta, depth = 0) {
    const cacheKey = `${state.id}_${idx}_${state.strategy}`;
    
    // 如果是溯源历史且已有缓存，直接 O(1) 返回，打破 O(N^2) 雪崩魔咒！
    if (depth > 0 && decisionCache.has(cacheKey)) {
        return decisionCache.get(cacheKey);
    }

    const base = getBasePosition(idx, full, ind, meta);
    const market = getMarketContext(full[idx]?.date);
    const risk = getRiskContext(idx, full, ind);
    const exit = getExitSeverity(meta, idx, full, ind);
    
    let position = roundPosition(Math.min(base * market.coef * risk.coef, market.maxPosition));
    
    if(exit.level === '清仓防守' || exit.level === '强离场' || meta.inCooldown || meta.type.includes('离场') || meta.type.includes('破位')) position = 0;
    else if(exit.level === '减仓观察' || exit.level === '延续防守') position = Math.min(position, 30);
    
    if(meta.warningSignals?.length) position = Math.min(position, 40);
    if(risk.score < 40) position = Math.min(position, 20);
    
    let prevAdv = 0;
    if (depth < 40 && idx > 0) {
        const prevMeta = getSignalMeta(idx - 1, full, ind);
        prevAdv = getDecisionContext(idx - 1, full, ind, prevMeta, depth + 1).position;
    }

    if (prevAdv === 0 && position > 0 && meta.type === '📈 趋势抱单') { position = 0; }

    const signalReady = meta.windowScore >= STRATEGY.buyThreshold;
    
    let simpleAction = '持币观望', simpleColor = 'var(--text-dim)';
    if (position === 0) {
        if (exit.level === '清仓防守' || exit.level === '强离场' || meta.type.includes('规避') || meta.type.includes('破位')) { 
            simpleAction = '清仓离场'; simpleColor = 'var(--red)'; 
        }
    } else if (position <= 30) {
        if (exit.level === '减仓观察' || exit.level === '延续防守' || meta.warningSignals?.length) {
            simpleAction = prevAdv === 0 ? '谨慎试探' : '防守减仓'; simpleColor = 'var(--yellow)';
        } else { 
            simpleAction = '轻仓试探'; simpleColor = 'var(--blue)'; 
        }
    } else {
        if (meta.type === '📈 趋势抱单' && meta.buySignals.length === 0) { 
            simpleAction = '顺势持有'; simpleColor = 'var(--green)'; 
        } else { 
            simpleAction = '积极持有'; simpleColor = 'var(--green)'; 
        }
    }

    let regimeName = '震荡分化', stance = '中性观察', recommended = '综合全能型', reason = '市场缺乏明确主线';
    if (market.label === '全面多头') { regimeName = '主升浪'; stance = '积极做多'; recommended = '突破追涨型'; reason = '多头共振，适合右侧追涨'; }
    else if (market.label === '温和偏多' || market.label === '结构性题材行情') { regimeName = '震荡上行'; stance = '低吸高抛'; recommended = '稳健趋势型'; reason = '存在结构机会，适合趋势跟随'; }
    else if (market.label === '全面弱势') { regimeName = '单边空头'; stance = '空仓防守'; recommended = '波段抄底型'; reason = '市场走弱，适合左侧抄底或空仓'; }

    const result = { 
        basePosition: base, position, prevAdv, market, risk, exit, signalReady, 
        regime: { regime: regimeName, stance, recommended, reason }, 
        simpleAction, simpleColor 
    };

    // 缓存绝对收盘的确切历史结论 (排除今日实时波动的K线)
    if (idx < full.length - 1) {
        decisionCache.set(cacheKey, result);
    }

    return result;
}

function getWeeklyDirectionContext(idx, full, ind) {
    const item = full[idx], close = item.close;
    const ma20 = ind.ma[20]?.[idx], ma60 = ind.ma[60]?.[idx], prevMa20 = ind.ma[20]?.[Math.max(0, idx-2)] || ma20;
    const recent = full.slice(Math.max(0, idx-19), idx+1);
    const high20 = recent.length ? Math.max(...recent.map(d=>d.high)) : close, low20 = recent.length ? Math.min(...recent.map(d=>d.low)) : close;
    const distMA20 = ma20 ? (close - ma20) / ma20 : 0;
    let direction = '方向不明', directionReason = '周线样本不足，暂不判断大方向';
    if(ma20 && ma60) {
        if(close > ma20 && ma20 > ma60 && ma20 >= prevMa20) { direction = '周线多头'; directionReason = '价格站上20周与60周均线，20周均线保持上行'; }
        else if(close < ma20 && ma20 < ma60 && ma20 <= prevMa20) { direction = '周线空头'; directionReason = '价格位于20周与60周均线下方，趋势仍偏防守'; }
        else { direction = '周线震荡'; directionReason = '均线结构尚未形成清晰共振'; }
    }
    let position = '位置中性';
    if(distMA20 > 0.12 || close >= high20 * 0.96) position = '偏高，追涨性价比下降';
    else if(distMA20 < -0.08 || close <= low20 * 1.06) position = '靠近防守区，等待修复';
    else if(Math.abs(distMA20) <= 0.03) position = '贴近20周均线，方向选择临近';
    let repair = '未修复';
    if(ma20) { if(close > ma20 && ma20 >= prevMa20) repair = '已修复'; else if(close > ma20) repair = '修复中'; }
    const dailyImpact = direction === '周线多头' ? '日线买点可信度提高，可关注回踩后的确认' : direction === '周线空头' ? '日线买点降权，优先等待周线重新站回' : '只适合轻仓观察，避免把震荡当趋势';
    return { direction, directionReason, position, repair, dailyImpact, ma20, ma60, support: low20, pressure: high20, distMA20 };
}

function updateAllIndicators(incrementalIdx = -1) {
    const full = getActiveData(); if(!full) return;
    
    // 🚀 核心修复3：流式更新前加入降级保护。如果是刚上市的新股数据不足，直接全量计算防止越界
    if (incrementalIdx === -1 || !state.indicators.macd || full.length < 60) {
        MA_OPTIONS.forEach(n => state.indicators.ma[n] = Calcs.ma(full, n));
        state.indicators.macd = Calcs.macd(full); 
        state.indicators.rsi = Calcs.rsi(full); 
        state.indicators.kdj = Calcs.kdj(full);
        for(let i=0; i<full.length; i++) {
            if (full[i]._signals && i !== full.length - 1) continue; 
            full[i]._signals = calculateDailySignals(i, full, state.indicators);
        }
    } else {
        const i = incrementalIdx;
        if(i < 1) return;
        
        MA_OPTIONS.forEach(n => {
            if (i >= n - 1) {
                let s = 0; for(let j=0; j<n; j++) s+= full[i-j].close;
                state.indicators.ma[n][i] = s/n;
            }
        });
        
        const c = full[i].close;
        const macd = state.indicators.macd;
        macd._e12[i] = c * 2/13 + macd._e12[i-1] * 11/13;
        macd._e26[i] = c * 2/27 + macd._e26[i-1] * 25/27;
        macd.diff[i] = macd._e12[i] - macd._e26[i];
        macd.dea[i] = macd.diff[i] * 2/11 + macd.dea[i-1] * 9/11;
        macd.bar[i] = macd.diff[i] - macd.dea[i];
        
        const rsi = state.indicators.rsi;
        const g = Math.max(0, full[i].close - full[i-1].close);
        const l = Math.max(0, full[i-1].close - full[i].close);
        rsi._g[i] = g; rsi._l[i] = l;
        rsi._ag[i] = (rsi._ag[i-1] * 13 + g) / 14;
        rsi._al[i] = (rsi._al[i-1] * 13 + l) / 14;
        rsi.val[i] = 100 - 100 / (1 + (rsi._ag[i] / (rsi._al[i] || 0.0001)));
        
        const kdj = state.indicators.kdj;
        if (i >= 8) {
            const slice = full.slice(i-8, i+1);
            const hn = Math.max(...slice.map(v=>v.high)), ln = Math.min(...slice.map(v=>v.low));
            const rsv = hn === ln ? 50 : (full[i].close - ln) / (hn - ln) * 100;
            kdj.k[i] = (2/3) * kdj.k[i-1] + (1/3) * rsv;
            kdj.d[i] = (2/3) * kdj.d[i-1] + (1/3) * kdj.k[i];
            kdj.j[i] = 3 * kdj.k[i] - 2 * kdj.d[i];
        }
        
        full[i]._signals = calculateDailySignals(i, full, state.indicators);
    }
}

function clearCharts(){
    Object.keys(state.charts).forEach(k=>{if(state.charts[k]){state.charts[k].destroy();delete state.charts[k]}});
    ['mainChart','volumeChart','macdChart','kdjChart'].forEach(id=>{
        const el=document.getElementById(id); if(!el)return; const p=el.parentElement; p.style.position='relative';
        let ph=p.querySelector('.empty-hint'); if(!ph){ph=document.createElement('div');ph.className='empty-hint';p.appendChild(ph);}
        ph.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#334155;font-size:12px;font-weight:600;letter-spacing:1px;z-index:5';
        ph.innerText={'mainChart':'K 线图','volumeChart':'成交量','macdChart':'MACD','kdjChart':'KDJ'}[id]+' — 暂无数据';

}

function draw() {
    document.querySelectorAll('.empty-hint').forEach(e=>e.remove());
    const currentFd = getActiveData(); 
    if(!currentFd || !currentFd.length) { clearCharts(); return; }
    
    updateAllIndicators();
    const actualRange = state.period === 'weekly' ? Math.ceil(state.range / 5) : state.range;
    const slice = currentFd.slice(-actualRange);
    const labels = slice.map(d => d.date);
    
    const ly = { padding:{left:8,right:8,top:10,bottom:0} };
    const yc = { position:'right', grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#64748b', font:{size:10}, padding:12}, afterFit: (scale) => { scale.width = 60; } };
    const yv = { ...yc, ticks:{ ...yc.ticks, callback: (v) => { if(v >= 100000000) return (v/100000000).toFixed(1) + '亿'; if(v >= 10000) return (v/10000).toFixed(0) + '万'; return v; } } };
    
    const uc = (k, id, cfg) => {
        if(state.charts[k]) { state.charts[k].data = cfg.data; state.charts[k].options = cfg.options; state.charts[k].update('none'); } 
        else { const el = document.getElementById(id); if(el) state.charts[k] = new Chart(el, cfg); }
    };
    
    const ds = state.activeMAs.map(n => ({
        label: `MA${n}`, data: state.indicators.ma[n]?.slice(-actualRange) || [], 
        borderColor: MA_COLORS[n], borderWidth: 1.2, pointRadius: 0, order: 1,
        isCandle: false, candleData: null
    }));
    
    ds.push({
        label: 'KLine', isCandle: true, 
        candleData: slice.map(d => ({o:d.open, h:d.high, l:d.low, c:d.close})), 
        data: slice.map(d => d.close), 
        borderColor: 'transparent', pointRadius: 0, order: 0,
        _instanceId: state.id + '_' + Date.now() 
    });

    const localAlignPlugin = {
        id: 'localAlignPlugin',
        afterDatasetsDraw: c => {
            const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = c;
            const dss = c.data.datasets.find(d => d.isCandle === true && d.candleData);
            if (dss && dss.candleData) {
                const w = Math.min((x.width / c.data.labels.length) * 0.8, 20);
                dss.candleData.forEach((d, i) => {
                    if (!d) return;
                    const px = x.getPixelForValue(i), cl = d.c >= d.o ? '#ef4444' : '#22c55e';
                    ctx.strokeStyle = cl; ctx.beginPath(); ctx.moveTo(px, c.scales.y.getPixelForValue(d.h)); ctx.lineTo(px, c.scales.y.getPixelForValue(d.l)); ctx.stroke();
                    ctx.fillStyle = cl; ctx.fillRect(px - w / 2, Math.min(c.scales.y.getPixelForValue(d.o), c.scales.y.getPixelForValue(d.c)), w, Math.max(Math.abs(c.scales.y.getPixelForValue(d.o) - c.scales.y.getPixelForValue(d.c)), 1.5));
                });
            }
            const safeIdx = getSafeIndex(getActiveData()); const actData = getActiveData();
            if (actData && safeIdx >= 0 && safeIdx < actData.length) {
                const targetDate = actData[safeIdx].date; const li = c.data.labels.indexOf(targetDate);
                if (li >= 0) {
                    const px = x.getPixelForValue(li);
                    if (px >= left && px <= right) {
                        ctx.save(); ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
                        ctx.moveTo(px, top); ctx.lineTo(px, bottom); ctx.stroke(); ctx.restore();
                    }
                }
            }
        }
    };
    
    const commonTooltipOptions = {
        enabled: true, mode: 'index', intersect: false,
        backgroundColor: 'rgba(2,6,23,0.95)', titleColor: '#f1f5f9', bodyColor: '#cbd5e1', borderColor: 'rgba(59,130,246,0.3)', borderWidth: 1,
        callbacks: {
            label: it => {
                const dFd = getActiveData(); if (!dFd) return '';
                const liveRange = state.period === 'weekly' ? Math.ceil(state.range / 5) : state.range;
                const dSlice = dFd.slice(-liveRange); const d = dSlice[it.dataIndex]; if (!d) return '';
                if (it.datasetIndex < state.activeMAs.length) return it.dataset.label + ': ' + (it.raw ? it.raw.toFixed(2) : '--');
                const p = dSlice[it.dataIndex - 1]; const ch = d.close - (p ? p.close : d.open);
                return `收:${d.close.toFixed(2)} 涨跌:${ch >= 0 ? '+' : ''}${ch.toFixed(2)}`;
            }
        }
    };
    
    const baseOptions = { responsive:true, maintainAspectRatio:false, animation:false, layout:ly, interaction: { mode: 'index', intersect: false } };

    uc('main','mainChart',{ type:'line', data:{labels, datasets:ds}, options:{ ...baseOptions, plugins:{ legend:{display:false}, tooltip: commonTooltipOptions }, scales:{x:{display:false}, y:yc}, onHover:(e,els)=>syncHover(els) }, plugins: [localAlignPlugin] });
    uc('vol','volumeChart',{ type:'bar', data:{ labels, datasets:[{ data:slice.map(d=>d.vol), backgroundColor:slice.map(d=> d.close >= d.open ? 'rgba(239,68,68,0.75)' : 'rgba(34,197,94,0.75)') }] }, options: { ...baseOptions, plugins:{ legend:{display:false}, tooltip:{mode:'index', intersect:false} }, scales:{x:{display:false}, y:yv}, onHover:(e,els)=>syncHover(els) }, plugins: [localAlignPlugin] });
    
    if(state.indicators.macd) {
        const md = state.indicators.macd;
        uc('macd','macdChart',{ type:'line', data:{ labels, datasets:[ {data:md.diff.slice(-actualRange), borderColor:'#3b82f6', borderWidth:1, pointRadius:0}, {data:md.dea.slice(-actualRange), borderColor:'#f59e0b', borderWidth:1, pointRadius:0}, {type:'bar', data:md.bar.slice(-actualRange), backgroundColor:md.bar.slice(-actualRange).map(v=>v>=0?'rgba(239,68,68,0.6)':'rgba(34,197,94,0.6)')} ] }, options: { ...baseOptions, plugins:{ legend:{display:false}, tooltip:{mode:'index', intersect:false} }, scales:{x:{display:false}, y:yc}, onHover:(e,els)=>syncHover(els) }, plugins: [localAlignPlugin] });
    }
    if(state.indicators.kdj) {
        const kd = state.indicators.kdj;
        uc('kdj','kdjChart',{ type:'line', data:{ labels, datasets:[ {label: 'K', data:kd.k.slice(-actualRange), borderColor:'#f1f5f9', borderWidth:1, pointRadius:0, tension:0.2}, {label: 'D', data:kd.d.slice(-actualRange), borderColor:'#f59e0b', borderWidth:1, pointRadius:0, tension:0.2}, {label: 'J', data:kd.j.slice(-actualRange), borderColor:'#a855f7', borderWidth:1, pointRadius:0, tension:0.2} ] }, options: { ...baseOptions, plugins:{ legend:{display:false}, tooltip:{mode:'index', intersect:false} }, scales:{x:{display:false}, y:yc}, onHover:(e,els)=>syncHover(els) }, plugins: [localAlignPlugin] });
    }
}

let hoverRAF = null;
function syncHover(els) {
    if(els && els.length) {
        const li = els[0].index;
        const activeData = getActiveData();
        const actualRange = state.period === 'weekly' ? Math.ceil(state.range / 5) : state.range;
        const sl = activeData.slice(-actualRange);
        const dataItem = sl[li];
        
        if(dataItem) {
            const ti = activeData.indexOf(dataItem);
            if(ti >= 0 && state.lockIdx !== ti){
                setLockIdx(ti);
                if(hoverRAF) cancelAnimationFrame(hoverRAF);
                hoverRAF = requestAnimationFrame(() => {
                    safeUpdateSidebar();
                    Object.values(state.charts).forEach(c=>{ if(c){ c.setActiveElements([{datasetIndex:0, index:li}]); c.update('none'); } });
                });
            }
        }
    }
}

    const decision = getDecisionContext(idx, full, state.indicators, meta);
    const adv = decision.position, prevAdv = decision.prevAdv;
    
    let ct = `维持在 ${adv}%`, cc = 'var(--text-dim)';

    else if (adv > prevAdv) {

            ct = meta.windowScore >= STRATEGY.buyThreshold ? `动能转强，建仓至 ${adv}%` : `关注异动，试探建仓至 ${adv}%`;

        ptsValid += UI.sectionTitle('近期有效信号', '#10b981');

        });
    }

    const riskFlags = decision.risk.flags.length ? decision.risk.flags.join(' / ') : '无高波动或严重偏离';
    const primaryReason = decision.exit.level !== '无明确离场' ? decision.exit.detail : decision.regime.reason;

const renderCache = new Map();

function safeUpdateSidebar() {
    const rd = getActiveData();
    if (rd && rd.length > 0) {
        const safeIdx = getSafeIndex(rd);
        setLockIdx(safeIdx);
        
        const item = rd[safeIdx];
        const cacheKey = `${state.id}_${item.date}_${state.strategy}_${state.period}_${item.close}_${item.vol}`;
        
        if (renderCache.has(cacheKey)) { applySidebarHTML(renderCache.get(cacheKey)); return; }

        const prev = safeIdx > 0 ? rd[safeIdx - 1] : null;
        const htmlBundle = generateSidebarBundle(item, prev, safeIdx, rd);
        
        if (renderCache.size > SYS_CONFIG.RENDER_CACHE_SIZE) { renderCache.delete(renderCache.keys().next().value); }
        renderCache.set(cacheKey, htmlBundle);
        
        applySidebarHTML(htmlBundle);
    } else {
        applySidebarHTML({ priceHtml: '', analysisHtml: '', isHide: true });
    }
}

function applySidebarHTML(bundle) {
    const cPrice = document.getElementById('cardPrice'), cAnalysis = document.getElementById('cardAnalysis');
    if(!cPrice || !cAnalysis) return;
    if (bundle.isHide) { cPrice.style.display = 'none'; cAnalysis.style.display = 'none'; return; }
    cPrice.style.display = 'block'; cAnalysis.style.display = 'block';
    cPrice.innerHTML = bundle.priceHtml; cAnalysis.innerHTML = bundle.analysisHtml;
}

        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:12px;font-weight:800;color:var(--text-dim);">${headerMeta}</div>
            <div class="nav-capsule">
                <button class="btn-sm" onclick="prevDay()">&larr;</button>
                <button class="btn-sm" onclick="nextDay()">&rarr;</button>

            <div class="price-main ${cls}">${item.close.toFixed(2)}</div>

        </div>
