<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101114">
<title>DailyGlance</title>
<style>
:root {
  --bg: #101114;
  --panel: #181a20;
  --panel-2: #20242b;
  --line: rgba(255,255,255,.1);
  --text: #f4f6f8;
  --muted: #98a2ad;
  --teal: #14b8a6;
  --blue: #38bdf8;
  --yellow: #f59e0b;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
body { padding: max(18px, env(safe-area-inset-top, 0px)) 14px max(18px, env(safe-area-inset-bottom, 0px)); }
.shell { width: min(860px, 100%); margin: 0 auto; }
.topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; padding: 10px 0 16px; border-bottom: 1px solid var(--line); }
.brand { min-width: 0; }
.brand h1 { margin: 0; font-size: 24px; line-height: 1.05; letter-spacing: 0; }
.brand p { margin: 7px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
.grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-top: 18px; }
.card { min-width: 0; border: 1px solid var(--line); border-radius: 10px; background: linear-gradient(180deg, rgba(37,42,50,.95), rgba(24,26,32,.98)); padding: 16px; }
.card h2 { margin: 0; font-size: 20px; line-height: 1.15; }
.card p { min-height: 48px; margin: 10px 0 14px; color: var(--muted); font-size: 13px; line-height: 1.55; }
.meta { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1px; overflow: hidden; border: 1px solid rgba(255,255,255,.07); border-radius: 8px; background: rgba(255,255,255,.08); margin-bottom: 14px; }
.metric { min-width: 0; padding: 8px 6px; background: rgba(16,17,20,.7); text-align: center; }
.metric span { display: block; color: var(--muted); font-size: 10px; }
.metric strong { display: block; margin-top: 3px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
.btn { display: flex; align-items: center; justify-content: center; min-height: 42px; border-radius: 9px; text-decoration: none; font-weight: 950; color: #062f2c; background: var(--teal); }
.btn.secondary { color: #e7eaee; background: var(--panel-2); border: 1px solid var(--line); }
@media (max-width: 680px) {
  .topbar { align-items: flex-start; flex-direction: column; }
  .brand h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
  .card p { min-height: 0; }
}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand">
      <h1>DailyGlance</h1>
      <p>选择一个版本进入。极速版适合快速看盘，完整版适合桌面深度分析。</p>
    </div>
  </header>

  <section class="grid" aria-label="DailyGlance 版本入口">
    <article class="card">
      <h2>极速版</h2>
      <p>适合手机和快速看盘，优先展示操作建议、建议上限、风险位和近 180 日模拟回测。</p>
      <div class="meta">
        <div class="metric"><span>定位</span><strong>快看</strong></div>
        <div class="metric"><span>布局</span><strong>卡片</strong></div>
        <div class="metric"><span>回测</span><strong>摘要</strong></div>
      </div>
      <div class="actions">
        <a class="btn" href="./dailyglance-fast.html">打开极速版</a>
      </div>
    </article>

    <article class="card">
      <h2>完整版</h2>
      <p>适合桌面分析，保留完整图表、指标、策略设置、回测和更细的信号解释。</p>
      <div class="meta">
        <div class="metric"><span>定位</span><strong>深看</strong></div>
        <div class="metric"><span>布局</span><strong>图表</strong></div>
        <div class="metric"><span>指标</span><strong>完整</strong></div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="./dailyglance-full.html">打开完整版</a>
      </div>
    </article>
  </section>
</main>
</body>
</html>
