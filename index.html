            <div class="data-item-mini"><span class="data-label-mini">今开</span><span class="data-value-mini">${item.open.toFixed(2)}</span></div>
            <div class="data-item-mini"><span class="data-label-mini">最高</span><span class="data-value-mini">${item.high.toFixed(2)}</span></div>
            <div class="data-item-mini"><span class="data-label-mini">最低</span><span class="data-value-mini">${item.low.toFixed(2)}</span></div>
            <div class="data-item-mini"><span class="data-label-mini">收盘</span><span class="data-value-mini">${item.close.toFixed(2)}</span></div>
        </div>
        <div class="amt-row">
            <span class="amt-label">成交额</span><span class="amt-value">${amtText}</span>
        </div>
        <div class="data-note">数据源：东方财富/腾讯财经；盘中数据可能延迟或缺字段。</div>`;
    
    const meta = getSignalMeta(safeIdx, rd, state.indicators);
    const analysisHtml = generateAnalysisHTML(safeIdx, rd, meta);
    
    return { priceHtml, analysisHtml, isHide: false };
}

async function runBacktest() {
    if(state.mode !== 'stock' || !state.id) return customAlert("请先选择并查看一只具体的股票后再运行回测。");
    const full = state.rawData[state.id];
    if(!full || full.length < 100) return customAlert("历史数据不足，无法完成精准回测。");
    
    document.getElementById('loading').innerText = "沙盘推演中...";
    document.getElementById('loading').style.display = 'flex';
    
    // 🚀 清空决策缓存，确保回测始终保持最新鲜的环境推演
    decisionCache.clear();
    await new Promise(r => setTimeout(r, 100)); 
    
    let capital = 10000, peakCapital = 10000, maxDrawdown = 0;
    const days = 250; 
    const startIdx = Math.max(60, full.length - days);
    let prevAdv = 0, winCount = 0, totalTrades = 0, entryPrice = 0;
    
    for(let i = startIdx; i < full.length; i++) {
        const item = full[i], prev = full[i-1];
        if (prevAdv > 0) {
            const dailyRet = (item.close - prev.close) / prev.close;
            capital = capital * (1 + dailyRet * (prevAdv / 100));
            if(capital > peakCapital) peakCapital = capital;
            const dd = (peakCapital - capital) / peakCapital;
            if(dd > maxDrawdown) maxDrawdown = dd;
        }
        
        const meta = getSignalMeta(i, full, state.indicators);
        const decision = getDecisionContext(i, full, state.indicators, meta, 0);
        
        if (prevAdv === 0 && decision.position > 0) {
            entryPrice = item.close;
        } else if (prevAdv > 0 && decision.position === 0) {
            totalTrades++;
            if (item.close > entryPrice) winCount++;
        }
        
        prevAdv = decision.position;
    }
    
    const ret = ((capital - 10000) / 10000 * 100).toFixed(2);
    const winRate = totalTrades > 0 ? ((winCount / totalTrades) * 100).toFixed(1) : 0;
    const md = (maxDrawdown * 100).toFixed(2);
    
    document.getElementById('loading').style.display = 'none';
    
    const content = `
        <div style="font-size:16px;font-weight:900;margin-bottom:16px;color:var(--blue);letter-spacing:1px;">回测报告: ${state.stockId}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">基于「${state.strategy}」过去 ${full.length - startIdx} 个交易日的实盘沙盘推演</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left;">
            <div style="background:var(--inner-bg);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);">
                <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:700;">区间策略收益</div>
                <div style="font-size:20px;font-weight:900;font-family:JetBrains Mono;color:${ret>=0?'var(--red)':'var(--green)'}">${ret>0?'+':''}${ret}%</div>
            </div>
            <div style="background:var(--inner-bg);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);">
                <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:700;">极端最大回撤</div>
                <div style="font-size:20px;font-weight:900;font-family:JetBrains Mono;color:#fff">${md}%</div>
            </div>
            <div style="background:var(--inner-bg);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);grid-column:1/-1;">
                <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:700;">波段交易胜率</div>
                <div style="display:flex;justify-content:space-between;align-items:end;">
                    <div style="font-size:20px;font-weight:900;font-family:JetBrains Mono;color:var(--yellow)">${winRate}%</div>
                    <div style="font-size:12px;color:var(--text-dim);font-weight:700;">共 ${totalTrades} 次完整买卖，获利 ${winCount} 次</div>
                </div>
            </div>
        </div>
        <div style="margin-top:16px;font-size:10px;color:#64748b;line-height:1.6;text-align:left;">注：回测按盘末收盘价触发，并严格叠加了大盘环境系数及动态仓位防守。历史业绩不代表未来表现。</div>
    `;
    await customAlert(content, true);
}

function searchLocalStocks(q) {
    const qt = q.toLowerCase();
    const fb = STOCK_DATABASE.filter(s => s.Name.toLowerCase().includes(qt) || s.Code.includes(qt));
    const fc = stockCache.filter(s => !fb.some(b=>b.Code===s.Code) && (s.Name.toLowerCase().includes(qt) || s.Code.includes(qt)));
    return fb.concat(fc);
}

function jsonpSearchEastmoney(query) {
    return new Promise(resolve => {
        const cb = 'em_cb_' + Date.now(); 
        const url = `https://searchadapter.eastmoney.com/api/suggest/get?input=${encodeURIComponent(query)}&type=14&token=${STOCK_TOKEN}&cb=${cb}`;
        let cl=false; 
        const cleanup = () => {
            if(cl) return;
            cl=true; clearTimeout(timer); delete window[cb];
            const s=document.getElementById('jq_'+cb);
            if(s) s.remove();
        };
        const timer=setTimeout(()=>{cleanup();resolve([]);},5000);
        window[cb] = data => { 
            cleanup(); 
            resolve(data?.QuotationCodeTable?.Data?.filter(x=>/^\d{6}$/.test(x.Code))||[]); 
        };
        const script=document.createElement('script'); script.id='jq_'+cb; script.src=url; script.onerror=()=>resolve([]); document.head.appendChild(script);
    });
}

function jsonpSearchSina(query) {
    return new Promise(resolve => {
        const cb = 'sina_cb_' + Date.now(); 
        const url = `https://suggest.sinajs.cn/suggest/type=11&key=${encodeURIComponent(query)}&callback=${cb}`;
        let cl=false; 
        const cleanup=() => {
            if(cl)return;
            cl=true; clearTimeout(timer); delete window[cb];
            const s=document.getElementById('jq_'+cb);
            if(s)s.remove();
        };
        const timer=setTimeout(()=>{cleanup();resolve([]);},5000);
        window[cb] = data => { 
            cleanup(); 
            resolve(data?.result?.items?.map(i=>({Code:i.code,Name:i.name})).filter(x=>/^\d{6}$/.test(x.Code))||[]); 
        };
        const script=document.createElement('script'); script.id='jq_'+cb; script.src=url; script.onerror=()=>resolve([]); document.head.appendChild(script);
    });
}

async function jsonpSearch(query) { 
    const r = await jsonpSearchEastmoney(query); 
    return r.length ? r : await jsonpSearchSina(query); 
}

let suggestTimer = null; let suggestActiveIdx = -1;
function onSearchInput() { clearTimeout(suggestTimer); suggestTimer = setTimeout(fetchSuggestions, 200); }
function closeSuggestions() { const el = document.getElementById('stockSuggest'); if(el) el.style.display='none'; suggestActiveIdx=-1; }
async function fetchSuggestions() {
    const inp = document.getElementById('stockSearchInput'), sug = document.getElementById('stockSuggest'); if(!inp||!sug) return;
    const q = inp.value.trim(); if(!q) { sug.style.display='none'; return; }
    let res = searchLocalStocks(q).slice(0,20); if(!res.length) res = await jsonpSearch(q);
    if(!res.length) { sug.innerHTML='<div class="stock-suggest-empty">没有找到匹配</div>'; sug.style.display='block'; return; }
    renderSuggest(sug, res.slice(0,20));
}
async function searchAndShowInSuggest(q) {
    const sug = document.getElementById('stockSuggest'); if(!sug) return; sug.innerHTML='<div class="stock-suggest-empty">搜索中...</div>'; sug.style.display='block';
    let res = await jsonpSearch(q); if(!res.length) res = searchLocalStocks(q).slice(0,20);
    if(!res.length) { sug.innerHTML='<div class="stock-suggest-empty">未找到匹配</div>'; return; } renderSuggest(sug, res.slice(0,20));
}
function renderSuggest(container, res) { 
    container.innerHTML = res.map(x=>`<div class="stock-suggest-item" onclick="selectSuggestItem('${escapeJSArg(x.Code)}','${escapeJSArg(x.Name)}')"><span class="ss-name">${escapeHTML(x.Name)}</span><span class="ss-code">${escapeHTML(x.Code)}</span></div>`).join(''); 
    container.style.display='block'; 
}
function selectSuggestItem(code, name) { 
    closeSuggestions(); 
    const i=document.getElementById('stockSearchInput'); 
    const safeCode = String(code || '').trim(), safeName = String(name || '').trim(); 
    if(i) i.value=''; 
    if(!/^\d{6}$/.test(safeCode)) return; 
    if(!STOCK_DATABASE.some(s=>s.Code===safeCode)&&!stockCache.some(s=>s.Code===safeCode)) { 
        stockCache.push({Code:safeCode,Name:safeName}); dbSet('stock_cache',stockCache); 
    } 
    selectStock(safeCode,safeName); 
}
function onSearchKeydown(e) {
    const inp=document.getElementById('stockSearchInput'), sug=document.getElementById('stockSuggest'), items=sug?sug.querySelectorAll('.stock-suggest-item'):[];
    if(e.key==='Escape'){ closeSuggestions(); return; }
    if(e.key==='Enter') { e.preventDefault(); const q=inp.value.trim(); if(q) searchAndShowInSuggest(q); }
}

async function loadWatchlist() { try { const w=await dbGet('watchlist_list'); state.watchlist=(w&&w.data)||[]; } catch(e) { state.watchlist=[]; } }
async function saveWatchlist() { await dbSet('watchlist_list', state.watchlist); }
async function addToWatchlist(code, name) { if(!state.watchlist.some(s=>s.code===code)) { if(state.watchlist.length>=10) { await customAlert('最多10只自选股'); return; } state.watchlist.push({code,name}); await saveWatchlist(); renderWatchlist(); } }
async function removeStock(code) { 
    state.watchlist = state.watchlist.filter(s=>s.code!==code); 
    await saveWatchlist(); 
    if(state.stockId===code) { 
        state.stockId=null; clearCharts(); 
        const cPrice = document.getElementById('cardPrice'); if(cPrice) { cPrice.style.display='block'; cPrice.innerHTML='<div class="stock-empty" style="padding:20px 0;">请选择自选股</div>'; }
        const cAnalysis = document.getElementById('cardAnalysis'); if(cAnalysis) cAnalysis.style.display='none';
    } 
    renderWatchlist(); 
}

async function selectStock(code, name) {
    const selectionSeq = ++stockSelectionSeq;
    const secid = codeToSecid(code); await addToWatchlist(code, name);
    if(selectionSeq !== stockSelectionSeq) return;
    state.mode='stock'; state.id=secid; state.stockId=code; activeIndexTab=null;
    
    document.querySelectorAll('#indexTabs .nav-btn').forEach(b=>b.classList.remove('active')); 
    document.querySelector('#indexTabs .nav-btn[data-id="stock"]').classList.add('active');
    
    // 切换股票时，清理沙盘缓存，确保不串数据
    decisionCache.clear();
    renderWatchlist(); clearCharts(); 
    
    await new Promise(resolve => setTimeout(resolve, 0));

    try {
        const data = await syncData(secid);
        if(selectionSeq !== stockSelectionSeq || state.id !== secid || state.stockId !== code) return;
        if(data && data.length && isValidPrice(data[data.length-1].close, secid)) { 
            setRawData(secid,data); await dbSet(secid,data); setLockIdx(getActiveData().length-1); 
            updateAllIndicators(); draw(); safeUpdateSidebar(); 
        } else throw new Error('Invalid');
    } catch(e) { 
        if(selectionSeq !== stockSelectionSeq || state.id !== secid || state.stockId !== code) return;
        setRawData(secid,null); clearCharts(); 
        const cPrice = document.getElementById('cardPrice'); if(cPrice) { cPrice.style.display='block'; cPrice.innerHTML='<div class="stock-empty" style="padding:20px 0;">无数据</div>'; }
        const cAnalysis = document.getElementById('cardAnalysis'); if(cAnalysis) cAnalysis.style.display='none';
    }
    
    debounceWatchlistUpdate();
}

let watchlistUpdateTimer = null;
function debounceWatchlistUpdate() {
    if (watchlistUpdateTimer) clearTimeout(watchlistUpdateTimer);
    watchlistUpdateTimer = setTimeout(async () => { await updateAllWatchlistData(); renderWatchlist(); }, 2000);
}

async function updateAllWatchlistData() {
    const results = [];
    for(const stock of state.watchlist) {
        const secid = codeToSecid(stock.code);
        if(secid === state.id) continue;
        try {
            const data = await syncData(secid);
            if(data && data.length >= 30 && isValidPrice(data[data.length-1].close, secid)) {
                setRawData(secid, data); results.push({code: stock.code, success: true});
            } else results.push({code: stock.code, success: false, reason: '数据不足'});
        } catch(e) {
            const cached = await dbGet(secid);
            if(cached && cached.data && cached.data.length >= 30) { setRawData(secid, cached.data); results.push({code: stock.code, success: true, source: 'cache'}); }
            else results.push({code: stock.code, success: false, reason: e.message});
        }
    }
    return results;
}

function renderWatchlist() {
    const c1 = document.getElementById('cardWatchlist'); if(!c1) return;
    if (state.mode !== 'stock') { c1.style.display = 'none'; return; }
    c1.style.display = 'block';

    const sHtml = `<div class="stock-search"><input id="stockSearchInput" placeholder="输入代码或名称..." autocomplete="off" oninput="onSearchInput()" onkeydown="onSearchKeydown(event)"><div class="stock-suggest" id="stockSuggest"></div></div>`;
    if(!state.watchlist.length) { c1.innerHTML = `<div class="stock-header"><div class="title-wrap"><span>自选股</span></div></div>${sHtml}<div class="stock-empty"><strong>搜索股票代码或名称</strong>添加后会自动显示K线、价格和策略分析</div>`; return; }
    const lHtml = state.watchlist.map(s => {
        const d = state.rawData[codeToSecid(s.code)], price = d?.length ? d[d.length-1].close : 0, prev = d?.length>1 ? d[d.length-2].close : (d?.length?d[0].open:1);
        const change = price-prev, pct = (change/prev*100)||0, cl = change>=0?'up':'down';
        return `<div class="stock-item ${s.code===state.stockId?'active':''}" onclick="selectStock('${escapeJSArg(s.code)}','${escapeJSArg(s.name)}')"><span class="sname">${escapeHTML(s.name)}</span><span class="scode">${escapeHTML(s.code)}</span><span class="sprice ${cl}">${price>0?price.toFixed(2):'--'}</span><span class="schange ${cl}">${pct!==0?(change>=0?'+':'')+pct.toFixed(2)+'%':'--'}</span><span class="wl-close" onclick="event.stopPropagation();removeStock('${escapeJSArg(s.code)}')">×</span></div>`;
    }).join('');
    c1.innerHTML = `<div class="stock-header"><div class="title-wrap"><span>自选股</span></div></div>${sHtml}<div style="margin-top:8px">${lHtml}</div>`;
}

function toggleMA(n) {
    if(state.activeMAs.includes(n)) state.activeMAs=state.activeMAs.filter(v=>v!==n); else state.activeMAs.push(n);
    state.activeMAs.sort((a,b)=>a-b); renderMASelector();
    if(state.charts['main']) { state.charts['main'].destroy(); delete state.charts['main']; }
    draw();
}
function renderMASelector() { 
    const c=document.getElementById('indicatorGroup'); 
    if(c) {
        c.innerHTML = MA_OPTIONS.map(n=>`<label class="ma-checkbox"><input type="checkbox" ${state.activeMAs.includes(n)?'checked':''} onchange="toggleMA(${n})"><span class="check-box" style="border-color:${MA_COLORS[n]};background-color:${state.activeMAs.includes(n)?MA_COLORS[n]:'transparent'}"></span>MA${n}</label>`).join(''); 
    }
}
function prevDay() { if(state.lockIdx>0) { setLockIdx(state.lockIdx - 1); draw(); safeUpdateSidebar(); } }
function nextDay() { const rd=getActiveData(); if(rd && state.lockIdx<rd.length-1) { setLockIdx(state.lockIdx + 1); draw(); safeUpdateSidebar(); } }
function resetLatest() { const rd=getActiveData(); if(rd) { setLockIdx(rd.length-1); draw(); safeUpdateSidebar(); } }
function toggleHelp() { const o = document.getElementById('helpOverlay'); if(o) o.style.display = o.style.display === 'flex' ? 'none' : 'flex'; }
async function switchStrategy(name) { 
    if(!STRATEGIES[name]) return;
    const confirmed = await customConfirm(`确定切换到「${name}」？\n${STRATEGIES[name].desc}`);
    if(!confirmed) return;
    
    // 🚀 清除决策缓存，因为策略改变会导致逻辑彻底变化
    decisionCache.clear();
    
    state.strategy=name; Object.assign(STRATEGY, STRATEGIES[name]); localStorage.setItem('quant_strategy', name); renderSettings(); 
    if(getActiveData()){ updateAllIndicators(); draw(); safeUpdateSidebar(); } 
}
function toggleSettings() { 
    const o = document.getElementById('settingsOverlay'); 
    if(o) { 
        if(o.classList.contains('show')) o.classList.remove('show'); 
        else { renderSettings(); o.classList.add('show'); } 
    } 
}

async function init() {
    try { await openDB(); } catch(e) {}
    try { await loadWatchlist(); } catch(e) { state.watchlist = []; }
    try { const sc = await dbGet('stock_cache'); if(sc&&sc.data) stockCache = sc.data; } catch(e) {}
    
    const savedStrat = localStorage.getItem('quant_strategy'); 
    if(savedStrat && STRATEGIES[savedStrat]) { state.strategy = savedStrat; Object.assign(STRATEGY, STRATEGIES[savedStrat]); } 
    else { state.strategy = '稳健趋势型'; Object.assign(STRATEGY, STRATEGIES['稳健趋势型']); }

    await preloadCacheOnly();
    
    document.querySelectorAll('#indexTabs .nav-btn').forEach(b=>b.onclick=async e=>{
        document.querySelectorAll('#indexTabs .nav-btn').forEach(btn=>btn.classList.remove('active')); e.target.classList.add('active');
        if(e.target.dataset.id==='stock') {
            state.mode='stock'; activeIndexTab=null; renderWatchlist();
            if(!state.stockId) { 
                if(state.watchlist.length) await selectStock(state.watchlist[0].code, state.watchlist[0].name); 
                else { clearCharts(); const cPrice = document.getElementById('cardPrice'); if(cPrice) { cPrice.style.display='block'; cPrice.innerHTML='<div class="stock-empty" style="padding:20px 0;">请搜索并添加自选股</div>'; } const cAnalysis = document.getElementById('cardAnalysis'); if(cAnalysis) cAnalysis.style.display='none'; } 
            } else await selectStock(state.stockId, state.watchlist.find(s=>s.code===state.stockId)?.name || '股票');
            return;
        }
        state.mode='index'; state.id=e.target.dataset.id; 
        
        // 🚀 切回大盘时清理缓存防止串数据
        decisionCache.clear();
        renderWatchlist(); clearCharts(); 
        
        await new Promise(r => setTimeout(r, 0)); await cachedFetch(state.id);
    });

    document.querySelectorAll('#periodTabs .range-btn').forEach(b=>b.onclick=e=>{
        const prevData = getActiveData(); const anchorDate = prevData?.[getSafeIndex(prevData)]?.date || null;
        rememberPeriodLock(); document.querySelector('#periodTabs .range-btn.active').classList.remove('active'); e.target.classList.add('active'); state.period = e.target.dataset.period;
        const isWeekly = state.period === 'weekly';
        document.querySelectorAll('#rangeTabs .range-btn').forEach(rb => { const rangeVal = parseInt(rb.dataset.range); rb.innerText = isWeekly ? Math.ceil(rangeVal / 5) + '周' : rangeVal + '天'; });
        setLockIdx(alignLockToPeriod(state.period, anchorDate)); requestAnimationFrame(() => { draw(); safeUpdateSidebar(); });
    });

    document.querySelectorAll('#rangeTabs .range-btn').forEach(b=>b.onclick=e=>{
        document.querySelector('#rangeTabs .range-btn.active').classList.remove('active'); e.target.classList.add('active'); state.range=+e.target.dataset.range; 
        if(state.charts['main']) { state.charts['main'].destroy(); delete state.charts['main']; } draw(); safeUpdateSidebar();
    });

    const container = document.querySelector('.integrated-container');
    if (container) {
        container.addEventListener('mouseleave', () => {
            const act = getActiveData();
            if(act && state.lockIdx !== act.length - 1) {
                setLockIdx(act.length - 1);
                if(hoverRAF) cancelAnimationFrame(hoverRAF);
                hoverRAF = requestAnimationFrame(() => { safeUpdateSidebar(); Object.values(state.charts).forEach(c => { if(c) { c.setActiveElements([]); c.update('none'); } }); });
            }
        });
    }

    ['mainChart','volumeChart','macdChart','kdjChart'].forEach(id=>{ const el=document.getElementById(id); if(el) el.onclick=e=>{ const c=Chart.getChart(el); if(!c) return; const pts=c.getElementsAtEventForMode(e,'index',{intersect:false},true); if(pts.length) syncHover(pts); }; });

    setInterval(() => { const e = document.getElementById('liveClock'); if(e) e.innerText = new Date().toLocaleTimeString('zh-CN',{hour12:false}); }, 1000);
    renderMASelector(); await cachedFetch(state.id); document.getElementById('loading').style.display='none';
    setTimeout(()=>ensureMarketTemperatureData(), 300);
    
    setTimeout(async ()=>{ if(isAfterMarketClose()) { const info = await checkCacheNeedUpdate(state.id); if(info.needUpdate) { const fr = await syncDataIncremental(state.id); if(fr&&fr.length) { await dbSet(state.id,fr); setRawData(state.id, fr); setLockIdx(getActiveData().length-1); updateAllIndicators(); draw(); } } } }, 1500);
    
    let realtimeInterval;
    function startRealtimeUpdate() {
        if(realtimeInterval) clearInterval(realtimeInterval);
        realtimeInterval = setInterval(async () => {
            if(!isMarketOpen() || !state.id) return;
            const rt = await requestManager.fetchRealtimeWithThrottle(state.id);
            if(rt) {
                const cached = await getCachedData(state.id); if(!cached || cached.length === 0) return;
                const now = new Date(), today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                
                if (cached[cached.length-1].date === today) { 
                    cached[cached.length-1] = rt; 
                    setRawData(state.id, cached);
                    updateAllIndicators(cached.length - 1); 
                } else { 
                    cached.push(rt); 
                    setRawData(state.id, cached);
                    updateAllIndicators(cached.length - 1); 
                }
                await dbSet(state.id, cached);
                
                const activeData = getActiveData();
                if(state.lockIdx >= activeData.length - 2) { setLockIdx(activeData.length - 1); }
                draw();
                if(state.lockIdx === activeData.length - 1) { safeUpdateSidebar(); }
            }
        }, 5000); 
    }
    startRealtimeUpdate();
    let rt; window.addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(()=>Object.values(state.charts).forEach(c=>c?.resize()),100); });
}

window.onload = init;
</script>
</body>
</html>
